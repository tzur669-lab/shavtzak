<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - עמדות</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <style>
    :root { --bg-base:#0d1117; --bg-card:#161b22; --bg-row:#1e2530; --border:#30363d; --text-main:#e6edf3; --text-muted:#7d8590; --accent:#1f6feb; }
    body { background:var(--bg-base); color:var(--text-main); font-family:'Segoe UI','Arial Hebrew',Arial,sans-serif; font-size:0.88rem; }
    .nav-bar { background:var(--bg-card); border-bottom:1px solid var(--border); padding:0.5rem 1rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
    .nav-bar .brand { font-size:1.1rem; font-weight:700; color:var(--accent); margin-left:auto; }
    .nav-link { color:var(--text-muted)!important; padding:0.35rem 0.65rem!important; border-radius:6px; font-size:0.82rem; text-decoration:none; }
    .nav-link:hover { background:rgba(255,255,255,0.07); color:var(--text-main)!important; }
    .nav-link.active { background:rgba(31,111,235,0.2); color:#58a6ff!important; }

    .main-wrap { padding:1rem; }
    .toolbar { display:flex; gap:0.5rem; margin-bottom:1rem; }
    .btn-add { background:var(--accent); color:#fff; border:none; padding:0.45rem 1rem; border-radius:6px; font-size:0.85rem; cursor:pointer; }
    .btn-add:hover { background:#388bfd; }

    /* כרטיסי עמדות */
    .posts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:0.85rem; }
    .post-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
      overflow:hidden; transition:border-color 0.2s;
    }
    .post-card:hover { border-color:rgba(88,166,255,0.3); }
    .post-header {
      padding:0.75rem 1rem; display:flex; align-items:center; gap:0.65rem;
      border-bottom:1px solid var(--border);
    }
    .post-color-bar { width:5px; height:36px; border-radius:3px; flex-shrink:0; }
    .post-name { font-weight:600; font-size:0.92rem; }
    .post-meta { font-size:0.75rem; color:var(--text-muted); }
    .post-actions { margin-right:auto; display:flex; gap:0.3rem; }
    .action-btn { background:none; border:none; cursor:pointer; padding:3px 6px; border-radius:4px; font-size:0.82rem; transition:background 0.15s; }
    .action-btn:hover { background:rgba(255,255,255,0.1); }

    /* דרישות */
    .reqs-wrap { padding:0.75rem 1rem; }
    .req-item {
      display:flex; align-items:center; gap:0.5rem;
      padding:0.3rem 0; border-bottom:1px solid rgba(255,255,255,0.05);
      font-size:0.82rem;
    }
    .req-item:last-child { border-bottom:none; }
    .req-label { flex:1; }
    .req-role { font-size:0.72rem; color:#e3b341; background:rgba(255,193,7,0.1); border:1px solid rgba(255,193,7,0.2); padding:1px 5px; border-radius:3px; }
    .btn-add-req { background:none; border:1px dashed var(--border); color:var(--text-muted); border-radius:5px; padding:3px 10px; font-size:0.75rem; cursor:pointer; width:100%; margin-top:0.5rem; transition:all 0.15s; }
    .btn-add-req:hover { border-color:#58a6ff; color:#58a6ff; }

    /* modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#1e2530; border:1px solid var(--border); border-radius:12px; padding:1.5rem; width:90%; max-width:440px; max-height:85vh; overflow-y:auto; }
    .modal-title { font-size:1rem; font-weight:700; color:#58a6ff; margin-bottom:1.25rem; }
    label { color:var(--text-muted); font-size:0.8rem; margin-bottom:0.2rem; display:block; }
    .form-control, .form-select { background:#0d1117; border:1px solid var(--border); color:var(--text-main); border-radius:6px; padding:0.4rem 0.65rem; width:100%; font-size:0.85rem; margin-bottom:0.85rem; }
    .form-control:focus, .form-select:focus { outline:none; border-color:var(--accent); }
    .form-select option { background:#1e2530; }
    .btn-save { background:var(--accent); color:#fff; border:none; padding:0.5rem 1.25rem; border-radius:6px; cursor:pointer; font-size:0.88rem; }
    .btn-cancel { background:#1e2530; color:var(--text-muted); border:1px solid var(--border); padding:0.5rem 1.25rem; border-radius:6px; cursor:pointer; font-size:0.88rem; }

    /* color palette */
    .palette { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:0.85rem; align-items:center; }
    .swatch { width:24px; height:24px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:border-color 0.15s; }
    .swatch.selected { border-color:#fff; }
    input[type=color] { width:28px; height:28px; border:none; background:none; cursor:pointer; padding:0; }

    /* reqs inline edit */
    .req-edit-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; align-items:center; }
    .req-edit-row .form-control, .req-edit-row .form-select { margin-bottom:0; flex:1; }
    .btn-del-req { background:rgba(220,53,69,0.12); color:#ea868f; border:1px solid rgba(220,53,69,0.3); border-radius:5px; padding:3px 8px; cursor:pointer; font-size:0.75rem; }

    .empty-state { text-align:center; padding:3rem; color:var(--text-muted); }
  </style>
</head>
<body>

<nav class="nav-bar">
  <span class="brand">⚔ שבצ"ק</span>
  <a href="index.html"       class="nav-link">לוח</a>
  <a href="shifts.html"      class="nav-link">שיבוץ</a>
  <a href="soldiers.html"    class="nav-link">חיילים</a>
  <a href="posts.html"       class="nav-link active">עמדות</a>
  <a href="admin_check.html" class="nav-link">בקרה</a>
  <a href="settings.html"    class="nav-link">הגדרות</a>
</nav>

<div class="main-wrap">
  <div class="toolbar">
    <button class="btn-add" onclick="openPostModal()">+ הוסף עמדה</button>
  </div>

  <div id="postsGrid">
    <div class="empty-state"><div style="font-size:2rem;">🏰</div><div>טוען...</div></div>
  </div>
</div>

<!-- מודל עמדה -->
<div class="modal-overlay" id="postModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">הוסף עמדה</div>

    <label>שם העמדה</label>
    <input type="text" id="fldPostName" class="form-control" placeholder="שער ראשי">

    <label>משך משמרת (דקות)</label>
    <input type="number" id="fldDuration" class="form-control" value="180" min="30" step="30">

    <label>צבע עמדה</label>
    <div class="palette" id="colorPalette"></div>
    <input type="hidden" id="fldColor" value="#007bff">

    <label>תקני שומרים (דרישות)</label>
    <div id="reqsEditList"></div>
    <button class="btn-add-req" onclick="addReqRow()">+ הוסף תקן</button>
    <div style="height:0.85rem;"></div>

    <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem;">
      <button class="btn-cancel" onclick="closePostModal()">ביטול</button>
      <button class="btn-save"   onclick="savePost()">שמור</button>
    </div>
  </div>
</div>

<script type="module">
import { getPosts, getRoles, addPost, updatePost, deletePost, addRequirement, deleteRequirement } from './js/firebase.js';
import { showToast, confirmDialog, COLOR_PALETTE } from './js/ui.js';

let posts = [], roles = [];
let editingId = null;
let tempReqs = []; // [{ id?, label, required_role_id }]

// ─── טעינה ────────────────────────────────────
async function loadAll() {
  [posts, roles] = await Promise.all([getPosts(), getRoles()]);
  renderGrid();
}

// ─── גריד עמדות ───────────────────────────────
function renderGrid() {
  const roleMap = {};
  roles.forEach(r => { roleMap[r.id] = r; });

  if (posts.length === 0) {
    document.getElementById('postsGrid').innerHTML = `<div class="empty-state"><div style="font-size:2rem;">🏰</div><div>אין עמדות מוגדרות</div></div>`;
    return;
  }

  let html = '<div class="posts-grid">';
  posts.forEach(post => {
    const color = post.post_color || '#6c757d';
    const reqs = post.requirements
      ? Object.entries(post.requirements).map(([id, r]) => ({ id, ...r }))
      : [];

    const reqsHtml = reqs.map(r => {
      const role = r.required_role_id ? roleMap[r.required_role_id] : null;
      return `<div class="req-item">
        <span class="req-label">${r.label || '—'}</span>
        ${role ? `<span class="req-role">${role.name}</span>` : ''}
        <button class="action-btn" onclick="deleteReqUI('${post.id}','${r.id}')" title="מחק">×</button>
      </div>`;
    }).join('');

    html += `<div class="post-card">
      <div class="post-header">
        <span class="post-color-bar" style="background:${color};"></span>
        <div>
          <div class="post-name">${post.name}</div>
          <div class="post-meta">⏱ ${post.duration_minutes || 60} דקות | ${reqs.length} תקנים</div>
        </div>
        <div class="post-actions">
          <button class="action-btn" onclick="openPostModal('${post.id}')" title="עריכה">✏️</button>
          <button class="action-btn" onclick="deletePostUI('${post.id}')" title="מחיקה">🗑️</button>
        </div>
      </div>
      <div class="reqs-wrap">
        ${reqsHtml || '<div style="color:#7d8590;font-size:0.78rem;">אין תקנים</div>'}
      </div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('postsGrid').innerHTML = html;
}

// ─── מודל עמדה ───────────────────────────────
window.openPostModal = function(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'עריכת עמדה' : 'הוסף עמדה';

  // פלטת צבעים
  buildPalette('#007bff');

  if (id) {
    const p = posts.find(x => x.id === id);
    if (p) {
      document.getElementById('fldPostName').value = p.name || '';
      document.getElementById('fldDuration').value = p.duration_minutes || 180;
      document.getElementById('fldColor').value = p.post_color || '#007bff';
      buildPalette(p.post_color || '#007bff');

      tempReqs = p.requirements
        ? Object.entries(p.requirements).map(([rid, r]) => ({ id: rid, ...r }))
        : [];
    }
  } else {
    document.getElementById('fldPostName').value = '';
    document.getElementById('fldDuration').value = 180;
    document.getElementById('fldColor').value = '#007bff';
    tempReqs = [];
  }

  renderReqsList();
  document.getElementById('postModal').classList.add('open');
};

window.closePostModal = function() {
  document.getElementById('postModal').classList.remove('open');
  editingId = null;
};

// ─── פלטת צבעים ───────────────────────────────
function buildPalette(selectedColor) {
  const palette = document.getElementById('colorPalette');
  palette.innerHTML = '';
  COLOR_PALETTE.forEach(c => {
    const sw = document.createElement('span');
    sw.className = 'swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => {
      palette.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      document.getElementById('fldColor').value = c;
    };
    palette.appendChild(sw);
  });

  const customInput = document.createElement('input');
  customInput.type = 'color';
  customInput.value = selectedColor;
  customInput.oninput = () => {
    palette.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    document.getElementById('fldColor').value = customInput.value;
  };
  palette.appendChild(customInput);
}

// ─── רשימת דרישות בטופס ────────────────────
function renderReqsList() {
  const roleMap = {};
  roles.forEach(r => { roleMap[r.id] = r; });
  const roleOptions = `<option value="">— כללי —</option>` +
    roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

  const list = document.getElementById('reqsEditList');
  list.innerHTML = '';
  tempReqs.forEach((req, i) => {
    const row = document.createElement('div');
    row.className = 'req-edit-row';
    row.innerHTML = `
      <input type="text" class="form-control" placeholder="תיאור תקן" value="${req.label || ''}">
      <select class="form-select">${roleOptions}</select>
      <button class="btn-del-req" onclick="removeReqRow(${i})">×</button>
    `;
    row.querySelector('input').oninput = e => { tempReqs[i].label = e.target.value; };
    const sel = row.querySelector('select');
    sel.value = req.required_role_id || '';
    sel.onchange = e => { tempReqs[i].required_role_id = e.target.value || null; };
    list.appendChild(row);
  });
}

window.addReqRow = function() {
  tempReqs.push({ label: '', required_role_id: null });
  renderReqsList();
};

window.removeReqRow = function(i) {
  tempReqs.splice(i, 1);
  renderReqsList();
};

// ─── שמירת עמדה ───────────────────────────────
window.savePost = async function() {
  const name = document.getElementById('fldPostName').value.trim();
  if (!name) { showToast('נא להזין שם עמדה', 'warning'); return; }

  const requirements = {};
  tempReqs.forEach((r, i) => {
    requirements[`req_${i}_${Date.now()}`] = {
      label: r.label || `תקן ${i + 1}`,
      required_role_id: r.required_role_id || null
    };
  });

  const data = {
    name,
    duration_minutes: parseInt(document.getElementById('fldDuration').value) || 180,
    post_color: document.getElementById('fldColor').value || '#007bff',
    requirements
  };

  try {
    if (editingId) {
      await updatePost(editingId, data);
      showToast('עמדה עודכנה', 'success');
    } else {
      await addPost(data);
      showToast('עמדה נוספה', 'success');
    }
    closePostModal();
    await loadAll();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

// ─── מחיקת דרישה ─────────────────────────────
window.deleteReqUI = async function(postId, reqId) {
  if (!await confirmDialog('למחוק תקן זה?', 'מחק')) return;
  try {
    await deleteRequirement(postId, reqId);
    showToast('תקן נמחק', 'success');
    await loadAll();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

// ─── מחיקת עמדה ──────────────────────────────
window.deletePostUI = async function(id) {
  const p = posts.find(x => x.id === id);
  if (!await confirmDialog(`למחוק את עמדת "${p?.name}"?`, 'מחק')) return;
  try {
    await deletePost(id);
    showToast('עמדה נמחקה', 'success');
    await loadAll();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

document.getElementById('postModal').addEventListener('click', function(e) {
  if (e.target === this) window.closePostModal();
});

loadAll();
</script>
</body>
</html>
