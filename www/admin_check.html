<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icons/icon-96.png" type="image/png">
  <title>שבצ"ק - דוח בקרה</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .report-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.82rem; }
    .report-table th {
      background: var(--bg-row-alt);
      padding: 0.5rem 0.65rem;
      font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap; text-transform: uppercase;
      position: sticky; top: 0; z-index: 1;
    }
    .report-table td {
      padding: 0.45rem 0.65rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .report-table tr:last-child td { border-bottom: none; }
    .report-table tr:hover td { filter: brightness(0.97); }

    .row-short   { background: #fef9ee !important; }
    .row-forced  { background: #fef2f2 !important; }
    .row-empty   { background: var(--bg-row-alt) !important; color: var(--text-muted); }

    [data-theme="dark"] .row-short  { background: #2a2000 !important; }
    [data-theme="dark"] .row-forced { background: #2a0d0d !important; }
    [data-theme="dark"] .row-empty  { background: var(--bg-row-alt) !important; }

    .row-post-bar {
      width: 3px; border-radius: 2px;
      display: inline-block; height: 16px;
      vertical-align: middle; margin-left: 5px;
    }
  </style>
</head>
<body class="page-enter">

<header class="page-header">
  <div>
    <div class="page-title">📊 דוח בקרה</div>
    <div class="page-subtitle">מנוחה ועומס</div>
  </div>
  <button class="btn btn-primary btn-sm" id="exportBtn" onclick="doExport()" style="display:none;">
    📤 ייצא
  </button>
</header>

<div class="page-wrap">

  <!-- פילטרים -->
  <div class="card" style="margin-bottom:0.75rem;">
    <div class="card-title">🔍 טווח דוח</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem;">
      <div class="form-group" style="margin:0;">
        <label class="form-label">התחלה</label>
        <input type="datetime-local" id="startTime" class="form-input">
      </div>
      <div class="form-group" style="margin:0;">
        <label class="form-label">סיום</label>
        <input type="datetime-local" id="endTime" class="form-input">
      </div>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" onclick="runReport()">🔄 הפק דוח</button>
      <button class="chip" onclick="setQuick(24)">24ש'</button>
      <button class="chip" onclick="setQuick(48)">48ש'</button>
      <button class="chip" onclick="setQuick(168)">שבוע</button>
    </div>
  </div>

  <!-- סיכום -->
  <div id="summaryRow" style="display:none;grid-template-columns:repeat(5,1fr);gap:0.5rem;margin-bottom:0.75rem;"></div>

  <!-- סינון שורות -->
  <div class="filter-chips" id="reportFilter" style="display:none;padding-bottom:0.6rem;">
    <button class="chip active" onclick="setRowFilter('all',this)">הכל</button>
    <button class="chip" onclick="setRowFilter('short',this)">מנוחה קצרה</button>
    <button class="chip" onclick="setRowFilter('forced',this)">כפויות</button>
    <button class="chip" onclick="setRowFilter('empty',this)">ריקות</button>
    <button class="chip" onclick="setRowFilter('ok',this)">תקין</button>
  </div>

  <!-- טבלה -->
  <div id="reportWrap"
    style="overflow-x:auto;background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);">
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">בחר טווח זמן והפק דוח</div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script type="module">
import { getShiftsInRange, getSoldiers, getPosts, getGroups, getSettings } from './js/firebase.js';
import {
  initPage, showToast,
  formatTime, formatDate, formatDayName, formatMinutes,
  toLocalInputValue, fromLocalInputValue
} from './js/ui.js';

initPage();

let reportData = null;
let rowFilter  = 'all';

function setDefaultTimes() {
  const now = new Date(); now.setMinutes(0, 0, 0);
  const end = new Date(now.getTime() + 48 * 3600000);
  document.getElementById('startTime').value = toLocalInputValue(now.toISOString());
  document.getElementById('endTime').value   = toLocalInputValue(end.toISOString());
}

window.setQuick = h => {
  const now = new Date(); now.setMinutes(0, 0, 0);
  const end = new Date(now.getTime() + h * 3600000);
  document.getElementById('startTime').value = toLocalInputValue(now.toISOString());
  document.getElementById('endTime').value   = toLocalInputValue(end.toISOString());
};

setDefaultTimes();

window.setRowFilter = (f, btn) => {
  rowFilter = f;
  document.querySelectorAll('#reportFilter .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  if (reportData) renderReport(reportData);
};

window.runReport = async function() {
  const sv = document.getElementById('startTime').value;
  const ev = document.getElementById('endTime').value;
  if (!sv || !ev) { showToast('נא לבחור טווח', 'warning'); return; }

  document.getElementById('reportWrap').innerHTML = `
    <div class="empty-state">
      <div class="spinner" style="margin:auto;"></div>
      <div style="margin-top:0.75rem;font-size:0.82rem;color:var(--text-muted);">טוען...</div>
    </div>`;

  const [shifts, soldiers, posts, groups, settings] = await Promise.all([
    getShiftsInRange(fromLocalInputValue(sv), fromLocalInputValue(ev)),
    getSoldiers(), getPosts(), getGroups(), getSettings()
  ]);

  reportData = { shifts, soldiers, posts, groups, settings };
  document.getElementById('reportFilter').style.display = 'flex';
  document.getElementById('exportBtn').style.display    = 'block';
  renderReport(reportData);
};

function renderReport({ shifts, soldiers, posts, groups, settings }) {
  const soldiersMap = {}, postsMap = {}, groupsMap = {};
  soldiers.forEach(s => { soldiersMap[s.id] = s; });
  posts.forEach(p    => { postsMap[p.id]    = p; });
  groups.forEach(g   => { groupsMap[g.id]   = g; });
  const minRest = settings.min_rest_minutes ?? 240;

  const rows = shifts.map(s => {
    const soldier  = s.soldier_id ? soldiersMap[s.soldier_id] : null;
    const post     = postsMap[s.post_id];
    const group    = soldier?.group_id ? groupsMap[soldier.group_id] : null;
    let category   = 'ok';
    if (!s.soldier_id) category = 'empty';
    else if (s.is_forced) category = 'forced';
    else if (s.rest_before_minutes !== null &&
             s.rest_before_minutes !== undefined &&
             s.rest_before_minutes < minRest) category = 'short';
    return { ...s, soldier, post, group, category };
  });

  const filtered = rowFilter === 'all' ? rows : rows.filter(r => r.category === rowFilter);

  // סיכום
  const total    = rows.length;
  const assigned = rows.filter(r => r.soldier_id).length;
  const forced   = rows.filter(r => r.category === 'forced').length;
  const short    = rows.filter(r => r.category === 'short').length;
  const empty    = rows.filter(r => r.category === 'empty').length;

  const summaryEl = document.getElementById('summaryRow');
  summaryEl.style.display = 'grid';
  summaryEl.innerHTML = [
    { label: 'סה"כ',       val: total,    color: 'var(--text-main)' },
    { label: 'שובצו',      val: assigned, color: 'var(--green)'     },
    { label: 'כפויות',     val: forced,   color: 'var(--red)'       },
    { label: 'מנוחה קצרה', val: short,    color: 'var(--yellow)'    },
    { label: 'ריקות',      val: empty,    color: 'var(--text-muted)'},
  ].map(x => `
    <div class="stat-card" style="padding:0.65rem;">
      <div class="stat-value" style="font-size:1.3rem;color:${x.color};">${x.val}</div>
      <div class="stat-label">${x.label}</div>
    </div>`).join('');

  if (filtered.length === 0) {
    document.getElementById('reportWrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">אין שורות תואמות</div>
      </div>`;
    return;
  }

  filtered.sort((a, b) => a.start_time.localeCompare(b.start_time));

  const rowCls = { ok: '', short: 'row-short', forced: 'row-forced', empty: 'row-empty' };
  const statusBadge = {
    ok:     '<span class="badge badge-green">תקין</span>',
    short:  '<span class="badge badge-yellow">מנוחה קצרה</span>',
    forced: '<span class="badge badge-red">כפוי</span>',
    empty:  '<span class="badge badge-gray">ריק</span>'
  };

  let html = `<table class="report-table">
    <thead><tr>
      <th>עמדה</th><th>חייל</th><th>מחלקה</th>
      <th>תאריך</th><th>שעות</th><th>מנוחה</th><th>סטטוס</th>
    </tr></thead><tbody>`;

  let lastDay = '';
  filtered.forEach(row => {
    const day       = row.start_time.substring(0, 10);
    const postColor = row.post?.post_color || '#9ca3af';
    const grpColor  = row.group?.color_hex || null;

    if (day !== lastDay) {
      lastDay = day;
      html += `<tr><td colspan="7"
        style="background:var(--accent-light);color:var(--accent-text);
          font-weight:700;font-size:0.75rem;padding:0.3rem 0.65rem;
          border-bottom:1px solid var(--border);">
        📅 ${formatDayName(day + 'T12:00:00')} — ${formatDate(day + 'T12:00:00')}
      </td></tr>`;
    }

    html += `<tr class="${rowCls[row.category]}">
      <td>
        <span class="row-post-bar" style="background:${postColor};"></span>
        ${row.post?.name || '—'}
      </td>
      <td style="font-weight:${row.soldier ? '600' : '400'};">
        ${row.soldier ? `#${row.soldier.soldier_number || '?'} ${row.soldier.first_name} ${row.soldier.last_name}` : '—'}
      </td>
      <td>
        ${grpColor
          ? `<span style="color:${grpColor};font-weight:600;">${row.group?.name}</span>`
          : '<span style="color:var(--text-muted);">—</span>'}
      </td>
      <td style="white-space:nowrap;font-size:0.75rem;">${formatDate(row.start_time)}</td>
      <td style="font-variant-numeric:tabular-nums;white-space:nowrap;">
        ${formatTime(row.start_time)}–${formatTime(row.end_time)}
      </td>
      <td style="font-variant-numeric:tabular-nums;">
        ${row.rest_before_minutes != null
          ? `<span style="color:${row.rest_before_minutes < minRest ? 'var(--red)' : 'var(--green)'};">
              ${formatMinutes(row.rest_before_minutes)}
            </span>`
          : '<span style="color:var(--text-muted);">—</span>'}
      </td>
      <td>${statusBadge[row.category]}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('reportWrap').innerHTML = html;
}

// ── ייצוא — תמונה או PDF לפי מכשיר ────────
window.doExport = async function() {
  if (!reportData) { showToast('הפק דוח תחילה', 'warning'); return; }

  // בדוק אם Native Share זמין (מובייל)
  const canShare = navigator.share && navigator.canShare;

  showToast('מכין ייצוא...', 'info');

  try {
    const el = document.getElementById('reportWrap');

    // צור canvas
    const canvas = await html2canvas(el, {
      backgroundColor: getComputedStyle(document.documentElement)
        .getPropertyValue('--bg-card').trim() || '#ffffff',
      scale: 2,
      useCORS: true,
      logging: false
    });

    const dateStr = new Date().toLocaleDateString('he-IL').replace(/\//g, '-');

    // מובייל — שתף ישירות
    if (canShare) {
      canvas.toBlob(async blob => {
        if (!blob) { showToast('שגיאה ביצירת קובץ', 'error'); return; }
        const file = new File([blob], `shavtzak-${dateStr}.png`, { type: 'image/png' });
        try {
          await navigator.share({ files: [file], title: 'דוח שבצ"ק' });
          showToast('✓ שותף בהצלחה', 'success');
        } catch (err) {
          // אם המשתמש ביטל — אל תציג שגיאה
          if (err.name !== 'AbortError') showToast('שגיאה בשיתוף', 'error');
        }
      }, 'image/png');
      return;
    }

    // דסקטופ — הורד כ-PNG
    const link = document.createElement('a');
    link.download = `shavtzak-report-${dateStr}.png`;
    link.href     = canvas.toDataURL('image/png');
    link.click();
    showToast('✓ תמונה הורדה', 'success');

  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};
</script>
</body>
</html>
