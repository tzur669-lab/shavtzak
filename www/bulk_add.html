<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icons/icon-96.png" type="image/png">
  <title>שבצ"ק - הוספה המונית</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="page-enter">

<header class="page-header">
  <div>
    <div class="page-title">👥 הוספה המונית</div>
    <div class="page-subtitle">ייבוא רשימת חיילים</div>
  </div>
  <a href="soldiers.html" class="btn btn-ghost btn-sm">← חזור</a>
</header>

<div class="page-wrap">

  <div class="info-box" style="margin-bottom:0.75rem;">
    <strong>פורמט:</strong> שורה לכל חייל — <code>שם פרטי שם משפחה, מחלקה</code><br>
    דוגמה: <code>ישראל ישראלי, פלוגה א</code><br>
    <span style="color:var(--text-muted);">מזהה חייל יינתן אוטומטית לפי סדר ההוספה. ניתן לשנות לאחר מכן בפרופיל החייל.</span>
  </div>

  <div class="card" style="margin-bottom:0.75rem;">
    <div class="form-group">
      <label class="form-label">הדבק רשימה</label>
      <textarea id="bulkInput" class="form-textarea" rows="8"
        placeholder="ישראל ישראלי, פלוגה א&#10;אלי כהן, פלוגה ב&#10;דוד לוי"></textarea>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-secondary btn-sm" onclick="preview()">👁 תצוגה מקדימה</button>
      <button class="btn btn-primary btn-sm" id="importBtn" disabled onclick="doImport()">⬆️ ייבא</button>
    </div>
  </div>

  <div id="previewWrap" style="display:none;">
    <div style="font-weight:700;font-size:0.88rem;margin-bottom:0.5rem;">תצוגה מקדימה</div>
    <div style="overflow-x:auto;background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);">
      <table class="data-table" id="previewTable"></table>
    </div>
  </div>

  <div id="resultWrap" style="display:none;margin-top:0.75rem;"></div>

</div>

<script type="module">
import { getGroups, getNextSoldierNumber, addSoldier } from './js/firebase.js';
import { initPage, showToast } from './js/ui.js';

initPage();

let parsedRows = [];
let groups     = [];
let startNum   = 1;

async function init() {
  groups   = await getGroups();
  startNum = await getNextSoldierNumber();
}
init();

function parseLine(line, autoNum) {
  const parts = line.split(',').map(p => p.trim());
  if (!parts[0]) return null;

  const nameParts = parts[0].trim().split(/\s+/);
  const first  = nameParts[0] || '';
  const last   = nameParts.slice(1).join(' ') || '';
  const grpName = parts[1]?.trim() || '';
  const group   = groups.find(g => g.name.trim() === grpName);

  return {
    soldier_number: autoNum,
    first_name:     first,
    last_name:      last,
    group_id:       group?.id || null,
    group_name:     grpName,
    group_found:    !!group
  };
}

window.preview = async function() {
  // עדכן מספר התחלה לפני תצוגה מקדימה
  startNum = await getNextSoldierNumber();

  const lines = document.getElementById('bulkInput').value
    .split('\n').map(l => l.trim()).filter(Boolean);

  parsedRows = [];
  lines.forEach((line, i) => {
    const row = parseLine(line, startNum + i);
    if (row) parsedRows.push(row);
  });

  if (parsedRows.length === 0) {
    showToast('לא נמצאו שורות תקינות', 'warning');
    return;
  }

  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('importBtn').disabled = false;

  document.getElementById('previewTable').innerHTML = `
    <thead><tr>
      <th>מזהה</th><th>שם פרטי</th><th>שם משפחה</th><th>מחלקה</th><th>סטטוס</th>
    </tr></thead>
    <tbody>
      ${parsedRows.map(r => `
        <tr>
          <td style="color:var(--accent);font-weight:700;">#${r.soldier_number}</td>
          <td>${r.first_name}</td>
          <td>${r.last_name || '<span style="color:var(--text-muted);">—</span>'}</td>
          <td>${r.group_name || '—'}</td>
          <td>
            ${r.group_name && r.group_found
              ? `<span class="badge badge-green">✓ מחלקה נמצאה</span>`
              : r.group_name
                ? `<span class="badge badge-yellow">⚠ מחלקה לא נמצאה</span>`
                : `<span class="badge badge-gray">ללא מחלקה</span>`}
          </td>
        </tr>`).join('')}
    </tbody>`;
};

window.doImport = async function() {
  if (parsedRows.length === 0) return;

  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> מייבא...';

  let added = 0;
  const errors = [];

  for (const row of parsedRows) {
    try {
      await addSoldier({
        soldier_number:         row.soldier_number,
        first_name:             row.first_name,
        last_name:              row.last_name,
        group_id:               row.group_id,
        is_active:              true,
        roles:                  [],
        min_rest_minutes:       null,
        absence_reason:         null,
        return_to_service_time: null
      });
      added++;
    } catch (err) {
      errors.push({ row, error: err.message });
    }
  }

  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('resultWrap').innerHTML = `
    <div class="card">
      <div class="card-title">✅ ייבוא הושלם</div>
      <div style="display:flex;flex-direction:column;gap:0.4rem;">
        <div style="background:var(--green-light);color:var(--green);
          padding:0.5rem 0.75rem;border-radius:var(--radius-md);
          display:flex;justify-content:space-between;">
          <span>נוספו</span><strong>${added}</strong>
        </div>
        ${errors.length > 0 ? `
          <div style="background:var(--red-light);color:var(--red);
            padding:0.5rem 0.75rem;border-radius:var(--radius-md);
            display:flex;justify-content:space-between;">
            <span>שגיאות</span><strong>${errors.length}</strong>
          </div>` : ''}
      </div>
      <div style="margin-top:0.75rem;font-size:0.78rem;color:var(--text-muted);">
        מזהים הוקצו: #${startNum} עד #${startNum + added - 1}
      </div>
      <a href="soldiers.html" class="btn btn-primary btn-full" style="margin-top:0.75rem;">
        ← חזור לרשימת חיילים
      </a>
    </div>`;

  showToast('✓ ייבוא הושלם', 'success');
  btn.disabled = false;
  btn.innerHTML = '⬆️ ייבא';
};
</script>
</body>
</html>
