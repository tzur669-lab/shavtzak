<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - הוספה המונית</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <style>
    :root { --bg-base:#0d1117; --bg-card:#161b22; --bg-row:#1e2530; --border:#30363d; --text-main:#e6edf3; --text-muted:#7d8590; --accent:#1f6feb; }
    body { background:var(--bg-base); color:var(--text-main); font-family:'Segoe UI','Arial Hebrew',Arial,sans-serif; font-size:0.88rem; }
    .nav-bar { background:var(--bg-card); border-bottom:1px solid var(--border); padding:0.5rem 1rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
    .nav-bar .brand { font-size:1.1rem; font-weight:700; color:var(--accent); margin-left:auto; }
    .nav-link { color:var(--text-muted)!important; padding:0.35rem 0.65rem!important; border-radius:6px; font-size:0.82rem; text-decoration:none; }
    .nav-link:hover { background:rgba(255,255,255,0.07); color:var(--text-main)!important; }
    .nav-link.active { background:rgba(31,111,235,0.2); color:#58a6ff!important; }

    .main-wrap { padding:1rem; max-width:640px; margin:0 auto; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; margin-bottom:1rem; }
    .card-title { font-size:0.95rem; font-weight:700; color:#58a6ff; margin-bottom:1rem; }
    label { color:var(--text-muted); font-size:0.8rem; margin-bottom:0.3rem; display:block; }
    textarea { background:#0d1117; border:1px solid var(--border); color:var(--text-main); border-radius:6px; padding:0.6rem; width:100%; font-size:0.83rem; font-family:monospace; resize:vertical; min-height:180px; line-height:1.6; }
    textarea:focus { outline:none; border-color:var(--accent); }
    .form-select { background:#0d1117; border:1px solid var(--border); color:var(--text-main); border-radius:6px; padding:0.4rem 0.65rem; width:100%; font-size:0.85rem; margin-bottom:0.85rem; }
    .form-select:focus { outline:none; border-color:var(--accent); }
    .form-select option { background:#1e2530; }
    .btn-import { background:var(--accent); color:#fff; border:none; padding:0.6rem 1.5rem; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; width:100%; transition:background 0.15s; }
    .btn-import:hover:not(:disabled) { background:#388bfd; }
    .btn-import:disabled { opacity:0.6; cursor:not-allowed; }

    /* preview */
    .preview-table { width:100%; border-collapse:separate; border-spacing:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:0.85rem; }
    .preview-table th { background:var(--bg-card); padding:0.4rem 0.65rem; font-size:0.75rem; color:var(--text-muted); border-bottom:1px solid var(--border); }
    .preview-table td { padding:0.35rem 0.65rem; font-size:0.8rem; border-bottom:1px solid rgba(255,255,255,0.04); }
    .preview-table tr:last-child td { border-bottom:none; }
    .row-ok    { background:#1e2530; }
    .row-error { background:rgba(220,53,69,0.12); }
    .row-update{ background:rgba(255,193,7,0.07); }

    /* תוצאה */
    .result-box { border-radius:8px; padding:1rem; margin-top:1rem; display:none; }
    .result-box.show { display:block; }
    .result-box.success { background:rgba(35,134,54,0.15); border:1px solid rgba(35,134,54,0.3); color:#3fb950; }
    .result-box.error   { background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.3); color:#f85149; }

    /* format help */
    .format-box { background:rgba(31,111,235,0.06); border:1px solid rgba(31,111,235,0.15); border-radius:6px; padding:0.75rem; margin-bottom:1rem; }
    .format-box code { color:#79c0ff; font-size:0.8rem; }
  </style>
</head>
<body>

<nav class="nav-bar">
  <span class="brand">⚔ שבצ"ק</span>
  <a href="index.html"       class="nav-link">לוח</a>
  <a href="shifts.html"      class="nav-link">שיבוץ</a>
  <a href="soldiers.html"    class="nav-link active">חיילים</a>
  <a href="posts.html"       class="nav-link">עמדות</a>
  <a href="admin_check.html" class="nav-link">בקרה</a>
  <a href="settings.html"    class="nav-link">הגדרות</a>
</nav>

<div class="main-wrap">
  <div class="card">
    <div class="card-title">📋 הוספת חיילים המונית</div>

    <div class="format-box">
      <strong style="font-size:0.8rem;color:#58a6ff;">פורמט:</strong>
      <code> שם פרטי שם משפחה, מספר אישי, שם מחלקה</code><br>
      <span style="font-size:0.75rem;color:#7d8590;">שורה אחת = חייל אחד. מחלקה אופציונלית. חייל קיים לפי מ"א יעודכן.</span>
    </div>

    <label>מחלקה ברירת מחדל (אם לא צוינה)</label>
    <select id="defaultGroup" class="form-select">
      <option value="">— ללא מחלקה —</option>
    </select>

    <label>רשימת חיילים</label>
    <textarea id="bulkInput" placeholder="ישראל ישראלי, 1234567, מחלקה א
יעקב לוי, 7654321, מחלקה ב
אברהם כהן, 1122334" oninput="previewParse()"></textarea>

    <div id="previewSection" style="margin-top:0.85rem;display:none;"></div>

    <button class="btn-import" id="importBtn" onclick="importSoldiers()" style="margin-top:0.75rem;">
      ⬆ ייבא חיילים
    </button>

    <div class="result-box" id="resultBox"></div>
  </div>
</div>

<script type="module">
import { getGroups, bulkAddSoldiers } from './js/firebase.js';
import { showToast } from './js/ui.js';

let groups = [];
let parsedRows = [];

// ─── טעינת מחלקות ─────────────────────────────
async function loadGroups() {
  groups = await getGroups();
  const sel = document.getElementById('defaultGroup');
  groups.forEach(g => {
    sel.innerHTML += `<option value="${g.id}">${g.name}</option>`;
  });
}

// ─── פרסור שורות ──────────────────────────────
window.previewParse = function() {
  const lines = document.getElementById('bulkInput').value
    .split('\n').map(l => l.trim()).filter(l => l);

  parsedRows = lines.map(line => parseLine(line));

  const section = document.getElementById('previewSection');
  if (parsedRows.length === 0) { section.style.display = 'none'; return; }

  let html = `<div style="font-size:0.78rem;color:#7d8590;margin-bottom:0.5rem;">${parsedRows.length} שורות</div>
    <table class="preview-table">
      <thead><tr><th>#</th><th>שם פרטי</th><th>שם משפחה</th><th>מ"א</th><th>מחלקה</th><th>סטטוס</th></tr></thead>
      <tbody>`;

  parsedRows.forEach((row, i) => {
    const cls = row.error ? 'row-error' : 'row-ok';
    html += `<tr class="${cls}">
      <td style="color:#7d8590;">${i + 1}</td>
      <td>${row.first_name || '<span style="color:#ea868f">—</span>'}</td>
      <td>${row.last_name  || '<span style="color:#ea868f">—</span>'}</td>
      <td style="font-family:monospace;">${row.serial_number || '—'}</td>
      <td>${row.group_name || '—'}</td>
      <td>${row.error ? `<span style="color:#ea868f;font-size:0.72rem;">✗ ${row.error}</span>` : '<span style="color:#3fb950;">✓</span>'}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  section.innerHTML = html;
  section.style.display = 'block';
};

function parseLine(line) {
  const parts = line.split(',').map(p => p.trim());
  const namePart = parts[0] || '';
  const names = namePart.split(/\s+/);

  if (names.length < 2) return { error: 'שם לא תקין', raw: line };

  const first_name = names.slice(0, -1).join(' ');
  const last_name  = names[names.length - 1];
  const serial_number = parts[1] || '';
  const group_name    = parts[2] || '';

  if (!serial_number) return { first_name, last_name, error: 'חסר מ"א', raw: line };

  // מציאת מחלקה לפי שם
  const group = groups.find(g => g.name === group_name);
  const group_id = group?.id || document.getElementById('defaultGroup').value || null;

  return { first_name, last_name, serial_number, group_name, group_id };
}

// ─── ייבוא ────────────────────────────────────
window.importSoldiers = async function() {
  if (parsedRows.length === 0) { showToast('אין שורות לייבוא', 'warning'); return; }

  const valid = parsedRows.filter(r => !r.error);
  if (valid.length === 0) { showToast('אין שורות תקינות', 'warning'); return; }

  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = 'מייבא...';

  try {
    const result = await bulkAddSoldiers(valid);

    const box = document.getElementById('resultBox');
    box.className = 'result-box show ' + (result.errors.length > 0 ? 'error' : 'success');
    box.innerHTML = `
      <strong>${result.errors.length === 0 ? '✓ הייבוא הושלם!' : '⚠ הייבוא הושלם עם שגיאות'}</strong><br>
      נוספו: ${result.added} | עודכנו: ${result.updated} | שגיאות: ${result.errors.length}
      ${result.errors.map(e => `<div style="font-size:0.75rem;margin-top:0.25rem;">✗ ${e.soldier.first_name} ${e.soldier.last_name}: ${e.error}</div>`).join('')}
    `;

    showToast(`ייבוא הושלם: ${result.added} נוספו, ${result.updated} עודכנו`, 'success', 5000);
    document.getElementById('bulkInput').value = '';
    document.getElementById('previewSection').style.display = 'none';
    parsedRows = [];
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '⬆ ייבא חיילים';
  }
};

loadGroups();
</script>
</body>
</html>
