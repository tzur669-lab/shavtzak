<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - שיבוץ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <style>
    :root {
      --bg-base:#0d1117; --bg-card:#161b22; --bg-row:#1e2530;
      --border:#30363d; --text-main:#e6edf3; --text-muted:#7d8590; --accent:#1f6feb;
    }
    body { background:var(--bg-base); color:var(--text-main); font-family:'Segoe UI','Arial Hebrew',Arial,sans-serif; font-size:0.88rem; }
    .nav-bar { background:var(--bg-card); border-bottom:1px solid var(--border); padding:0.5rem 1rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
    .nav-bar .brand { font-size:1.1rem; font-weight:700; color:var(--accent); margin-left:auto; }
    .nav-link { color:var(--text-muted)!important; padding:0.35rem 0.65rem!important; border-radius:6px; font-size:0.82rem; text-decoration:none; transition:background 0.15s,color 0.15s; }
    .nav-link:hover { background:rgba(255,255,255,0.07); color:var(--text-main)!important; }
    .nav-link.active { background:rgba(31,111,235,0.2); color:#58a6ff!important; }

    .main-wrap { padding:1rem; max-width:680px; margin:0 auto; }

    /* כרטיס */
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; margin-bottom:1rem; }
    .card-title { font-size:0.95rem; font-weight:700; color:#58a6ff; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }

    /* שדות טופס */
    label { color:var(--text-muted); font-size:0.8rem; margin-bottom:0.25rem; display:block; }
    .form-control, .form-select {
      background:#0d1117; border:1px solid var(--border); color:var(--text-main);
      border-radius:6px; padding:0.45rem 0.65rem; width:100%; font-size:0.85rem;
      transition:border-color 0.15s;
    }
    .form-control:focus, .form-select:focus { outline:none; border-color:var(--accent); background:#0d1117; color:var(--text-main); box-shadow:none; }
    .form-select option { background:#1e2530; }

    /* radio/checkbox */
    .option-group { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .option-btn {
      background:#0d1117; border:1px solid var(--border); color:var(--text-muted);
      border-radius:6px; padding:0.4rem 0.85rem; font-size:0.82rem; cursor:pointer;
      transition:all 0.15s; user-select:none;
    }
    .option-btn.selected { border-color:#1f6feb; background:rgba(31,111,235,0.15); color:#58a6ff; }

    /* checkbox */
    .check-wrap { display:flex; align-items:center; gap:0.5rem; cursor:pointer; }
    .check-wrap input[type=checkbox] { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; }

    /* כפתורים */
    .btn-run {
      background:var(--accent); color:#fff; border:none;
      padding:0.65rem 1.5rem; border-radius:8px; font-size:0.9rem; font-weight:600;
      cursor:pointer; width:100%; transition:background 0.15s;
    }
    .btn-run:hover:not(:disabled) { background:#388bfd; }
    .btn-run:disabled { opacity:0.6; cursor:not-allowed; }
    .btn-danger-outline {
      background:transparent; color:#ea868f; border:1px solid rgba(220,53,69,0.4);
      padding:0.45rem 1rem; border-radius:6px; font-size:0.82rem; cursor:pointer;
      transition:all 0.15s; width:100%;
    }
    .btn-danger-outline:hover { background:rgba(220,53,69,0.12); }

    /* progress */
    .progress-wrap { display:none; }
    .progress-wrap.show { display:block; }
    .progress { height:6px; background:#1e2530; border-radius:3px; overflow:hidden; margin-bottom:0.5rem; }
    .progress-bar { height:100%; background:var(--accent); transition:width 0.3s; border-radius:3px; }
    .progress-msg { color:var(--text-muted); font-size:0.78rem; }

    /* תוצאה */
    .result-box { display:none; border-radius:8px; padding:1rem; margin-top:1rem; }
    .result-box.show { display:block; }
    .result-box.success { background:rgba(35,134,54,0.15); border:1px solid rgba(35,134,54,0.3); }
    .result-box.error   { background:rgba(220,53,69,0.15);  border:1px solid rgba(220,53,69,0.3); }
    .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; margin-top:0.75rem; text-align:center; }
    .stat-item .val { font-size:1.4rem; font-weight:700; }
    .stat-item .lbl { font-size:0.72rem; color:var(--text-muted); }

    /* info */
    .info-note { background:rgba(31,111,235,0.08); border:1px solid rgba(31,111,235,0.2); border-radius:6px; padding:0.6rem 0.85rem; font-size:0.78rem; color:#8ab4f8; }

    /* divider */
    .divider { border-top:1px solid var(--border); margin:1rem 0; }
  </style>
</head>
<body>

<nav class="nav-bar">
  <span class="brand">⚔ שבצ"ק</span>
  <a href="index.html"       class="nav-link">לוח</a>
  <a href="shifts.html"      class="nav-link active">שיבוץ</a>
  <a href="soldiers.html"    class="nav-link">חיילים</a>
  <a href="posts.html"       class="nav-link">עמדות</a>
  <a href="admin_check.html" class="nav-link">בקרה</a>
  <a href="settings.html"    class="nav-link">הגדרות</a>
</nav>

<div class="main-wrap">

  <!-- הגדרות נוכחיות -->
  <div class="info-note" id="currentSettings" style="margin-bottom:1rem;">
    ⚙ מנוחה מינימלית מוגדרת: <strong id="minRestDisplay">—</strong>
  </div>

  <!-- טופס שיבוץ -->
  <div class="card">
    <div class="card-title">🗓 הגדרות שיבוץ</div>

    <!-- טווח זמן -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;">
      <div>
        <label>⏱ התחלה</label>
        <input type="datetime-local" id="startTime" class="form-control">
      </div>
      <div>
        <label>⏱ סיום</label>
        <input type="datetime-local" id="endTime" class="form-control">
      </div>
    </div>

    <!-- מצב הרצה -->
    <div style="margin-bottom:1rem;">
      <label>מצב הרצה</label>
      <div class="option-group" id="runModeGroup">
        <button class="option-btn selected" data-val="new" onclick="selectOption('runModeGroup',this)">
          🆕 חדש מאפס
        </button>
        <button class="option-btn" data-val="reassign" onclick="selectOption('runModeGroup',this)">
          🔄 שיבוץ מחדש
        </button>
        <button class="option-btn" data-val="holes" onclick="selectOption('runModeGroup',this)">
          🕳 מלא חורים
        </button>
      </div>
      <div id="runModeDesc" style="font-size:0.76rem;color:#7d8590;margin-top:0.4rem;">
        מחיקת משמרות קיימות בטווח ובנייה מחדש מאפס
      </div>
    </div>

    <!-- חוסר -->
    <div style="margin-bottom:1rem;">
      <label>בחוסר כוח אדם</label>
      <div class="option-group" id="shortageGroup">
        <button class="option-btn selected" data-val="empty" onclick="selectOption('shortageGroup',this)">
          ⬜ השאר ריק
        </button>
        <button class="option-btn" data-val="force" onclick="selectOption('shortageGroup',this)">
          ⚡ שבץ בכוח
        </button>
      </div>
    </div>

    <!-- חישוב מנוחה -->
    <div style="margin-bottom:1rem;">
      <label>חישוב ציון מנוחה</label>
      <div class="option-group" id="restCalcGroup">
        <button class="option-btn selected" data-val="regular" onclick="selectOption('restCalcGroup',this)">
          📊 רגיל (דקות)
        </button>
        <button class="option-btn" data-val="relative" onclick="selectOption('restCalcGroup',this)">
          📐 יחסי (÷ משך)
        </button>
      </div>
    </div>

    <!-- איפוס היסטוריה -->
    <div style="margin-bottom:1.25rem;">
      <label class="check-wrap">
        <input type="checkbox" id="resetHistory">
        <span>התעלם ממשמרות לפני תחילת הטווח</span>
      </label>
    </div>

    <!-- כפתור הפעלה -->
    <button class="btn-run" id="runBtn" onclick="runAssignment()">
      ▶ הפעל שיבוץ
    </button>

    <!-- progress -->
    <div class="progress-wrap" id="progressWrap" style="margin-top:1rem;">
      <div class="progress">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-msg" id="progressMsg">מכין...</div>
    </div>

    <!-- תוצאה -->
    <div class="result-box" id="resultBox">
      <div id="resultMsg"></div>
      <div class="stat-grid" id="statGrid"></div>
    </div>
  </div>

  <!-- איפוס -->
  <div class="card">
    <div class="card-title">⚠ פעולות מסוכנות</div>
    <label>מחיקת כל הטבלה</label>
    <p style="color:var(--text-muted);font-size:0.78rem;margin-bottom:0.75rem;">מוחק את כל המשמרות בכל הטווחים ללא אפשרות שחזור</p>
    <button class="btn-danger-outline" onclick="resetAll()">🗑 איפוס כל הטבלה</button>
  </div>

</div>

<script type="module">
import { getSettings, getShifts, deleteShift } from './js/firebase.js';
import { generateShifts } from './js/logic.js';
import { showToast, confirmDialog, formatMinutes, toLocalInputValue, fromLocalInputValue } from './js/ui.js';

// ─── טעינת הגדרות ─────────────────────────────
async function loadSettings() {
  const s = await getSettings();
  const mins = s.min_rest_minutes ?? 240;
  document.getElementById('minRestDisplay').textContent = formatMinutes(mins);
}
loadSettings();

// ─── ברירות מחדל לזמן ─────────────────────────
function setDefaultTimes() {
  const now = new Date();
  // עיגול לשעה הקרובה
  now.setMinutes(0, 0, 0);
  const end = new Date(now.getTime() + 24 * 60 * 60000);
  document.getElementById('startTime').value = toLocalInputValue(now.toISOString());
  document.getElementById('endTime').value   = toLocalInputValue(end.toISOString());
}
setDefaultTimes();

// ─── בחירת אפשרות ─────────────────────────────
window.selectOption = function(groupId, btn) {
  document.querySelectorAll(`#${groupId} .option-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (groupId === 'runModeGroup') {
    const descs = {
      new: 'מחיקת משמרות קיימות בטווח ובנייה מחדש מאפס',
      reassign: 'שמירת המשבצות, ריקון חיילים ושיבוץ מחדש',
      holes: 'מילוי עמדות ריקות בלבד ללא שינוי המשובצים'
    };
    document.getElementById('runModeDesc').textContent = descs[btn.dataset.val] || '';
  }
};

// ─── קבלת ערך נבחר ────────────────────────────
function getSelected(groupId) {
  return document.querySelector(`#${groupId} .option-btn.selected`)?.dataset.val;
}

// ─── הרצת שיבוץ ───────────────────────────────
window.runAssignment = async function() {
  const startLocal = document.getElementById('startTime').value;
  const endLocal   = document.getElementById('endTime').value;

  if (!startLocal || !endLocal) { showToast('נא להזין טווח זמן', 'warning'); return; }

  const startISO = fromLocalInputValue(startLocal);
  const endISO   = fromLocalInputValue(endLocal);

  if (startISO >= endISO) { showToast('זמן סיום חייב להיות אחרי זמן התחלה', 'warning'); return; }

  const runMode      = getSelected('runModeGroup');
  const shortageAction = getSelected('shortageGroup');
  const restCalc     = getSelected('restCalcGroup');
  const resetHistory = document.getElementById('resetHistory').checked;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'מריץ שיבוץ...';

  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('resultBox').classList.remove('show','success','error');

  try {
    const result = await generateShifts(
      startISO, endISO, shortageAction, restCalc, resetHistory, runMode,
      (pct, msg) => {
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressMsg').textContent = msg;
      }
    );

    const box = document.getElementById('resultBox');
    box.classList.add('show', 'success');
    document.getElementById('resultMsg').innerHTML = `
      <div style="color:#3fb950;font-weight:600;margin-bottom:0.25rem;">✓ שיבוץ הושלם בהצלחה</div>
    `;
    document.getElementById('statGrid').innerHTML = `
      <div class="stat-item"><div class="val" style="color:#3fb950">${result.assigned}</div><div class="lbl">משובצים</div></div>
      <div class="stat-item"><div class="val" style="color:#f85149">${result.forced}</div><div class="lbl">כפויים</div></div>
      <div class="stat-item"><div class="val" style="color:#7d8590">${result.empty}</div><div class="lbl">ריקים</div></div>
    `;

    showToast(`שיבוץ הושלם! ${result.assigned} משובצים, ${result.forced} כפויים, ${result.empty} ריקים`, 'success', 5000);
  } catch (err) {
    const box = document.getElementById('resultBox');
    box.classList.add('show', 'error');
    document.getElementById('resultMsg').innerHTML = `<div style="color:#f85149;">✗ שגיאה: ${err.message}</div>`;
    showToast('שגיאה בשיבוץ: ' + err.message, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ הפעל שיבוץ';
  }
};

// ─── איפוס כל הטבלה ──────────────────────────
window.resetAll = async function() {
  const confirmed = await confirmDialog(
    'פעולה זו תמחק את כל המשמרות ללא אפשרות שחזור. האם אתה בטוח?',
    'מחק הכל'
  );
  if (!confirmed) return;

  try {
    const all = await getShifts();
    await Promise.all(all.map(s => deleteShift(s.id)));
    showToast(`נמחקו ${all.length} משמרות`, 'success');
  } catch (err) {
    showToast('שגיאה במחיקה: ' + err.message, 'error');
  }
};
</script>
</body>
</html>
