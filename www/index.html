<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - לוח שמירות</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    /* ── שעון ── */
    .clock-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .clock-time {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }
    .clock-date { font-size: 0.78rem; color: var(--text-muted); }

    /* ── progress שיבוץ ── */
    .assign-progress {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .assign-progress-label { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
    .assign-pct { font-size: 0.78rem; font-weight: 700; color: var(--accent); white-space: nowrap; }

    /* ── כרטיסי סטטיסטיקה ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      padding: 0.75rem 0.85rem 0;
    }
    @media (max-width: 480px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

    /* ── סינון מהיר ── */
    .filter-row {
      padding: 0.6rem 0.85rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── לוח ── */
    .board-wrap { padding: 0 0.85rem 1rem; }

    /* גוש יום */
    .day-block { margin-bottom: 1rem; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      background: var(--accent-light);
      border: 1px solid #bfdbfe;
      border-radius: var(--radius-md);
      margin-bottom: 0.4rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-text);
    }

    /* טבלת לוח */
    .board-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg-card); box-shadow: var(--shadow-sm); }
    .board-table thead th { background: var(--bg-row-alt); padding: 0.5rem 0.65rem; font-size: 0.72rem; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
    .board-table tbody tr { border-bottom: 1px solid var(--border); transition: background var(--transition); cursor: pointer; }
    .board-table tbody tr:last-child { border-bottom: none; }
    .board-table tbody tr:hover { background: var(--bg-hover); }
    .board-table td { padding: 0.5rem 0.65rem; vertical-align: middle; font-size: 0.82rem; }

    /* סטטוס שורה */
    .row-active  { background: #f0fdf4 !important; }
    .row-forced  { background: #fef2f2 !important; }
    .row-empty   { background: var(--bg-row-alt) !important; color: var(--text-muted); }
    .row-locked  { background: #fffbeb !important; }
    .row-highlight { background: #eff6ff !important; box-shadow: inset 3px 0 0 var(--accent); }

    [data-theme="dark"] .row-active  { background: #0d2a14 !important; }
    [data-theme="dark"] .row-forced  { background: #2a0d0d !important; }
    [data-theme="dark"] .row-empty   { background: var(--bg-row-alt) !important; }
    [data-theme="dark"] .row-locked  { background: #2a1f00 !important; }
    [data-theme="dark"] .row-highlight { background: #0d2444 !important; }

    /* פס צבע עמדה */
    .post-bar { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 20px; }
    .post-cell { display: flex; align-items: center; gap: 0.4rem; }

    /* תא חייל */
    .soldier-cell { display: flex; align-items: center; gap: 0.35rem; }
    .soldier-name { font-weight: 600; }
    .soldier-name.hl { color: var(--accent); }

    /* ספירה לאחור */
    .countdown { font-size: 0.7rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* כפתור חירום */
    .btn-emergency {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid var(--red-border);
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius-md);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn-emergency:hover { background: var(--red); color: #fff; }

    /* "מי זמין עכשיו" פאנל */
    .available-panel {
      background: var(--bg-card);
      border: 1px solid var(--green-border);
      border-radius: var(--radius-lg);
      padding: 0.85rem;
      margin: 0 0.85rem 1rem;
      display: none;
    }
    .available-panel.show { display: block; }
    .available-title { font-size: 0.82rem; font-weight: 700; color: var(--green); margin-bottom: 0.5rem; }
    .available-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .available-chip {
      background: var(--green-light);
      border: 1px solid var(--green-border);
      color: var(--green);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }
  </style>
</head>
<body class="page-enter">

<div id="offlineBanner"></div>
<div id="updateBanner"></div>

<!-- כותרת -->
<header class="page-header">
  <div>
    <div class="page-title">⚔ שבצ"ק</div>
    <div class="page-subtitle">לוח שמירות</div>
  </div>
  <div style="display:flex;gap:0.5rem;align-items:center;">
    <button class="btn btn-ghost btn-sm" onclick="toggleAvailable()" title="מי זמין עכשיו">👥</button>
    <button class="btn btn-ghost btn-sm" onclick="refreshBoard()" title="רענן">⟳</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleThemeBtn()" title="החלף ערכת נושא">🌙</button>
  </div>
</header>

<!-- שעון -->
<div class="clock-bar">
  <div>
    <div class="clock-time" id="clockTime">00:00:00</div>
    <div class="clock-date" id="clockDate">—</div>
  </div>
  <div style="font-size:0.75rem;text-align:left;">
    <div>עדכון: <span id="lastUpdate">—</span></div>
    <div>משמרות: <span id="shiftCount">—</span></div>
  </div>
</div>

<!-- progress שיבוץ -->
<div class="assign-progress" id="assignProgress" style="display:none;">
  <div class="assign-progress-label">אחוז אכלוס:</div>
  <div class="progress-bar-track" style="flex:1;">
    <div class="progress-bar-fill" id="assignFill" style="width:0%"></div>
  </div>
  <div class="assign-pct" id="assignPct">0%</div>
</div>

<!-- סטטיסטיקות -->
<div class="stats-row" id="statsRow"></div>

<!-- סינון מהיר -->
<div class="filter-row">
  <div class="search-bar" style="flex:1;min-width:140px;">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="חפש חייל..." oninput="filterBoard()">
  </div>
  <div class="filter-chips" id="filterChips">
    <button class="chip active" data-filter="all" onclick="setFilter('all',this)">הכל</button>
    <button class="chip" data-filter="current" onclick="setFilter('current',this)">עכשיו</button>
    <button class="chip" data-filter="empty" onclick="setFilter('empty',this)">ריקים</button>
    <button class="chip" data-filter="forced" onclick="setFilter('forced',this)">כפויים</button>
  </div>
</div>

<!-- מי זמין עכשיו -->
<div class="available-panel" id="availablePanel">
  <div class="available-title">👥 זמינים כרגע</div>
  <div class="available-grid" id="availableGrid">
    <span style="color:var(--text-muted);font-size:0.8rem;">טוען...</span>
  </div>
</div>

<!-- לוח -->
<div class="board-wrap" id="boardContainer">
  <div class="empty-state">
    <div class="empty-icon">📋</div>
    <div class="empty-title">טוען לוח שמירות...</div>
  </div>
</div>

<!-- מודל כרטיס חייל -->
<div class="modal-overlay" id="soldierCard">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="cardName">—</div>
    <div id="cardContent"></div>
    <button class="btn btn-secondary btn-full" onclick="closeCard()" style="margin-top:0.75rem;">סגור</button>
  </div>
</div>

<!-- מודל חירום -->
<div class="modal-overlay" id="emergencyModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🚨 שיבוץ חירום</div>
    <div class="info-box" style="margin-bottom:0.85rem;">
      בחר חייל זמין לשיבוץ מיידי. מסודר לפי זמן מנוחה.
    </div>
    <div id="emergencyList"></div>
    <button class="btn btn-secondary btn-full" onclick="closeEmergency()" style="margin-top:0.75rem;">ביטול</button>
  </div>
</div>

<script type="module">
import { subscribeToBoard, getSettings, getSoldiers, getShifts, updateShift, toggleShiftLock, swapShiftSoldiers } from './js/firebase.js';
import { findEmergencySoldier } from './js/logic.js';
import { initPage, formatTime, formatDate, formatDayName, formatDateTime, formatMinutes, formatCountdown, restBadge, groupDot, roleBadge, showToast, confirmDialog } from './js/ui.js';

initPage();

let allData       = null;
let highlightedId = null;
let activeFilter  = 'all';
let searchQuery   = '';
let minRest       = 240;
let unsubscribe   = null;
let swapMode      = null; // { shiftId, soldierId }

// ── שעון ─────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    new Intl.DateTimeFormat('he-IL', { timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(now);
  document.getElementById('clockDate').textContent =
    new Intl.DateTimeFormat('he-IL', { timeZone: 'Asia/Jerusalem', weekday: 'long', day: 'numeric', month: 'long' }).format(now);
}
setInterval(updateClock, 1000);
updateClock();

// ── טעינה ────────────────────────────────────
async function startListening() {
  const settings = await getSettings();
  minRest = settings.min_rest_minutes ?? 240;

  unsubscribe = subscribeToBoard(data => {
    allData = data;
    document.getElementById('lastUpdate').textContent = formatTime(new Date().toISOString());
    renderBoard(data);
  });
}

window.refreshBoard = () => { if (unsubscribe) unsubscribe(); startListening(); };

// ── סינון ────────────────────────────────────
window.setFilter = (f, btn) => {
  activeFilter = f;
  document.querySelectorAll('#filterChips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  if (allData) renderBoard(allData);
};

window.filterBoard = () => {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  if (allData) renderBoard(allData);
};

// ── לוח ─────────────────────────────────────
function renderBoard({ shifts, soldiers, posts }) {
  const soldiersMap = {}, postsMap = {}, groupColors = {};
  soldiers.forEach(s => { soldiersMap[s.id] = s; });
  posts.forEach(p => { postsMap[p.id] = p; });

  const nowISO = new Date().toISOString();

  // סטטיסטיקות
  const total    = shifts.length;
  const assigned = shifts.filter(s => s.soldier_id).length;
  const forced   = shifts.filter(s => s.is_forced).length;
  const active   = shifts.filter(s => s.start_time <= nowISO && s.end_time > nowISO && s.soldier_id).length;
  document.getElementById('shiftCount').textContent = `${assigned}/${total}`;

  // progress אכלוס
  const pct = total > 0 ? Math.round((assigned / total) * 100) : 0;
  if (total > 0) {
    document.getElementById('assignProgress').style.display = 'flex';
    document.getElementById('assignFill').style.width = pct + '%';
    document.getElementById('assignPct').textContent = pct + '%';
  }

  // סטטיסטיקות
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <div class="stat-value">${total}</div>
      <div class="stat-label">סה"כ משמרות</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-value" style="color:var(--green);">${assigned}</div>
      <div class="stat-label">משובצות</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚡</div>
      <div class="stat-value" style="color:var(--red);">${forced}</div>
      <div class="stat-label">כפויות</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">▶</div>
      <div class="stat-value" style="color:var(--accent);">${active}</div>
      <div class="stat-label">פעילות עכשיו</div>
    </div>`;

  if (total === 0) {
    document.getElementById('boardContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">אין משמרות מוגדרות</div>
        <div class="empty-desc">עבור לדף שיבוץ כדי ליצור משמרות</div>
        <a href="shifts.html" class="btn btn-primary">🗓 עבור לשיבוץ</a>
      </div>`;
    return;
  }

  // סינון
  let filtered = shifts;
  if (activeFilter === 'current') filtered = shifts.filter(s => s.start_time <= nowISO && s.end_time > nowISO);
  else if (activeFilter === 'empty')  filtered = shifts.filter(s => !s.soldier_id);
  else if (activeFilter === 'forced') filtered = shifts.filter(s => s.is_forced);

  if (searchQuery) {
    filtered = filtered.filter(s => {
      const sol = s.soldier_id ? soldiersMap[s.soldier_id] : null;
      return sol && `${sol.first_name} ${sol.last_name}`.toLowerCase().includes(searchQuery);
    });
  }

  if (filtered.length === 0) {
    document.getElementById('boardContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">אין תוצאות</div>
        <div class="empty-desc">נסה לשנות את הסינון</div>
      </div>`;
    return;
  }

  // קיבוץ לפי יום
  const byDay = {};
  filtered.forEach(s => {
    const day = s.start_time.substring(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(s);
  });
  Object.values(byDay).forEach(arr => arr.sort((a,b) => a.start_time.localeCompare(b.start_time)));

  let html = '';
  Object.entries(byDay).sort(([a],[b]) => a.localeCompare(b)).forEach(([day, dayShifts]) => {
    const dayDate = new Date(day + 'T12:00:00');
    const isToday = day === nowISO.substring(0, 10);
    const dayLabel = isToday ? '📅 היום' : `📅 ${formatDayName(day + 'T12:00:00')} — ${formatDate(day + 'T12:00:00')}`;

    html += `<div class="day-block">
      <div class="day-header">${dayLabel}</div>
      <table class="board-table">
        <thead><tr>
          <th>עמדה</th><th>חייל</th><th>שעות</th><th>מנוחה</th><th></th>
        </tr></thead>
        <tbody>`;

    dayShifts.forEach(shift => {
      const post    = postsMap[shift.post_id];
      const soldier = shift.soldier_id ? soldiersMap[shift.soldier_id] : null;
      const postColor = post?.post_color || '#9ca3af';
      const req     = post?.requirements?.[shift.requirement_id];
      const isNow   = shift.start_time <= nowISO && shift.end_time > nowISO;
      const isForced = shift.is_forced;
      const isEmpty  = !shift.soldier_id;
      const isLocked = shift.is_locked;
      const isHL     = highlightedId && shift.soldier_id === highlightedId;

      let rowClass = '';
      if (isHL)     rowClass = 'row-highlight';
      else if (isNow && !isEmpty) rowClass = 'row-active';
      else if (isForced)  rowClass = 'row-forced';
      else if (isEmpty)   rowClass = 'row-empty';
      else if (isLocked)  rowClass = 'row-locked';

      // תא חייל
      let soldierHtml = '<span style="color:var(--text-muted);">—</span>';
      if (soldier) {
        const nameClass = isHL ? 'soldier-name hl' : 'soldier-name';
        const lockIcon = isLocked ? ' 🔒' : '';
        soldierHtml = `
          <div class="soldier-cell" onclick="openSoldierCard('${soldier.id}')">
            ${groupDot(soldier.group_color || '#9ca3af', 8)}
            <span class="${nameClass}">${soldier.first_name} ${soldier.last_name}${lockIcon}</span>
          </div>`;
      }

      // ספירה לאחור למשמרת פעילה
      const countdownHtml = isNow && shift.soldier_id
        ? `<div class="countdown">${formatCountdown(shift.end_time)}</div>` : '';

      html += `<tr class="${rowClass}" data-shift="${shift.id}">
        <td>
          <div class="post-cell">
            <span class="post-bar" style="background:${postColor};"></span>
            <div>
              <div style="font-weight:600;font-size:0.82rem;">${post?.name || '—'}</div>
              <div style="font-size:0.7rem;color:var(--text-muted);">${req?.label || ''}</div>
            </div>
          </div>
        </td>
        <td>${soldierHtml}</td>
        <td style="font-variant-numeric:tabular-nums;white-space:nowrap;">
          ${formatTime(shift.start_time)}–${formatTime(shift.end_time)}
          ${countdownHtml}
        </td>
        <td>${restBadge(shift.rest_before_minutes, minRest, shift.is_forced)}</td>
        <td style="white-space:nowrap;">
          ${isEmpty ? `<button class="btn-emergency" onclick="openEmergency('${shift.post_id}','${shift.requirement_id}','${shift.id}')">🚨 חירום</button>` : ''}
          ${!isEmpty ? `<button style="background:none;border:none;cursor:pointer;font-size:0.85rem;" onclick="toggleLock('${shift.id}',${!isLocked})" title="${isLocked ? 'שחרר נעילה' : 'נעל משמרת'}">${isLocked ? '🔓' : '🔒'}</button>` : ''}
        </td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  document.getElementById('boardContainer').innerHTML = html;
}

// ── הדגשת חייל ───────────────────────────────
window.openSoldierCard = async function(soldierId) {
  highlightedId = highlightedId === soldierId ? null : soldierId;
  if (allData) renderBoard(allData);

  if (!highlightedId) { return; }

  const soldier = allData.soldiers.find(s => s.id === soldierId);
  if (!soldier) return;

  const myShifts = allData.shifts
    .filter(s => s.soldier_id === soldierId)
    .sort((a,b) => b.start_time.localeCompare(a.start_time))
    .slice(0, 10);

  const totalMins = myShifts.reduce((sum, s) => {
    const d = (new Date(s.end_time) - new Date(s.start_time)) / 60000;
    return sum + d;
  }, 0);

  document.getElementById('cardName').textContent = `${soldier.first_name} ${soldier.last_name}`;
  document.getElementById('cardContent').innerHTML = `
    <div style="display:flex;gap:0.5rem;margin-bottom:0.85rem;flex-wrap:wrap;">
      <span class="badge badge-blue">מ"א: ${soldier.serial_number || '—'}</span>
      <span class="badge ${soldier.is_active ? 'badge-green' : 'badge-red'}">${soldier.is_active ? 'פעיל' : 'לא פעיל'}</span>
      <span class="badge badge-gray">סה"כ ${myShifts.length} משמרות</span>
      <span class="badge badge-gray">${Math.round(totalMins/60)}ש' שמירה</span>
    </div>
    <div style="font-size:0.78rem;color:var(--text-muted);font-weight:700;margin-bottom:0.4rem;text-transform:uppercase;">היסטוריה אחרונה</div>
    ${myShifts.length === 0 ? '<div style="color:var(--text-muted);font-size:0.82rem;">אין משמרות</div>' :
      myShifts.map(s => {
        const post = allData.posts.find(p => p.id === s.post_id);
        return `<div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border);font-size:0.82rem;">
          <span style="color:var(--text-sub);">${post?.name || '—'}</span>
          <span style="color:var(--text-muted);font-variant-numeric:tabular-nums;">${formatTime(s.start_time)} ${formatDate(s.start_time)}</span>
          ${restBadge(s.rest_before_minutes, minRest, s.is_forced)}
        </div>`;
      }).join('')}
  `;
  document.getElementById('soldierCard').classList.add('open');
};

window.closeCard = () => {
  document.getElementById('soldierCard').classList.remove('open');
  highlightedId = null;
  if (allData) renderBoard(allData);
};

// ── נעילת משמרת ──────────────────────────────
window.toggleLock = async function(shiftId, lock) {
  try {
    await toggleShiftLock(shiftId, lock);
    showToast(lock ? '🔒 משמרת ננעלה' : '🔓 נעילה שוחררה', 'info');
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

// ── מי זמין עכשיו ────────────────────────────
window.toggleAvailable = async function() {
  const panel = document.getElementById('availablePanel');
  const isOpen = panel.classList.toggle('show');
  if (!isOpen) return;

  const now = new Date().toISOString();
  const available = allData.soldiers.filter(s => {
    if (!s.is_active) return false;
    return !allData.shifts.some(sh =>
      sh.soldier_id === s.id && sh.start_time <= now && sh.end_time > now
    );
  });

  if (available.length === 0) {
    document.getElementById('availableGrid').innerHTML = '<span style="color:var(--text-muted);font-size:0.8rem;">אין חיילים זמינים כרגע</span>';
    return;
  }

  document.getElementById('availableGrid').innerHTML = available.map(s =>
    `<span class="available-chip">${groupDot(s.group_color || '#9ca3af', 7)} ${s.first_name} ${s.last_name}</span>`
  ).join('');
};

// ── שיבוץ חירום ──────────────────────────────
let emergencyShiftId = null;

window.openEmergency = async function(postId, reqId, shiftId) {
  emergencyShiftId = shiftId;
  document.getElementById('emergencyList').innerHTML = '<div style="text-align:center;padding:1rem;"><div class="spinner" style="margin:auto;"></div></div>';
  document.getElementById('emergencyModal').classList.add('open');

  const candidates = await findEmergencySoldier(postId, reqId);
  if (candidates.length === 0) {
    document.getElementById('emergencyList').innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:1rem;">אין חיילים זמינים</div>';
    return;
  }

  document.getElementById('emergencyList').innerHTML = candidates.slice(0, 8).map(c => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:0.4rem;">
        <span class="status-dot ${c.isLegal ? 'green' : 'red'}"></span>
        <span style="font-size:0.85rem;font-weight:600;">${c.first_name} ${c.last_name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        ${restBadge(c.restMins === 999999 ? null : Math.round(c.restMins), minRest, false)}
        <button class="btn btn-primary btn-sm" onclick="assignEmergency('${c.id}')">שבץ</button>
      </div>
    </div>`).join('');
};

window.assignEmergency = async function(soldierId) {
  if (!emergencyShiftId) return;
  try {
    await updateShift(emergencyShiftId, {
      soldier_id: soldierId,
      is_forced: false,
      updated_at: new Date().toISOString()
    });
    showToast('✓ חייל שובץ בהצלחה', 'success');
    closeEmergency();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

window.closeEmergency = () => {
  document.getElementById('emergencyModal').classList.remove('open');
  emergencyShiftId = null;
};

// ── סגירת modals בקליק חיצוני ────────────────
['soldierCard','emergencyModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
      if (id === 'soldierCard') { highlightedId = null; if (allData) renderBoard(allData); }
    }
  });
});

startListening();
</script>
</body>
</html>
