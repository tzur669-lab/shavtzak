<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - לוח שמירות</title>
  <link rel="icon" href="icons/icon-96.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    /* ── שורת משמרת ── */
    .shift-row {
      display: flex;
      align-items: center;
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius-md);
      gap: 0.5rem;
      font-size: 0.83rem;
      transition: background var(--transition);
      cursor: pointer;
      position: relative;
    }
    .shift-row:hover { background: var(--bg-hover); }
    .shift-row.active  { background: var(--green-light); }
    .shift-row.forced  { background: var(--red-light); }
    .shift-row.empty   { background: var(--bg-row-alt); opacity: 0.75; }
    .shift-row.locked  { background: var(--yellow-light); }
    .shift-row.highlighted { outline: 2px solid var(--accent); }

    .shift-post-bar {
      width: 3px; flex-shrink: 0; align-self: stretch;
      border-radius: 2px; min-height: 20px;
    }
    .shift-time {
      font-variant-numeric: tabular-nums;
      color: var(--text-muted); font-size: 0.78rem;
      white-space: nowrap; flex-shrink: 0;
    }
    .shift-post  { color: var(--text-muted); font-size: 0.78rem; flex-shrink: 0; }
    .shift-soldier { font-weight: 600; flex: 1; display: flex; align-items: center; gap: 0.35rem; }
    .shift-actions { display: flex; gap: 0.25rem; margin-right: auto; }

    /* נקודת מחלקה ליד שם חייל */
    .group-dot-inline {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }

    /* כרטיס חייל מודגש */
    .soldier-highlight-card {
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 0.85rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
    }

    /* מודל מחיקה */
    .delete-shift-item {
      display: flex; align-items: center;
      padding: 0.4rem 0.5rem;
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background var(--transition);
      gap: 0.5rem;
    }
    .delete-shift-item:hover { background: var(--bg-hover); }
    .delete-shift-item input[type=checkbox] { flex-shrink: 0; accent-color: var(--accent); width: 16px; height: 16px; }

    .day-divider {
      background: var(--accent-light);
      color: var(--accent-text);
      font-weight: 700; font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius-md);
      margin: 0.5rem 0 0.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* progress bar אכלוס */
    .fill-bar-wrap { margin-bottom: 0.75rem; }
    .fill-bar-label {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px;
    }
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem; margin-bottom: 0.75rem;
    }

    /* שעון */
    .clock-wrap {
      text-align: center; padding: 0.5rem 0 0.25rem;
    }
    .clock-time  { font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
    .clock-date  { font-size: 0.8rem; color: var(--text-muted); margin-top: -2px; }
  </style>
</head>
<body class="page-enter">

<header class="page-header">
  <div>
    <div class="page-title">📋 לוח שמירות</div>
    <div class="page-subtitle" id="headerSub">טוען...</div>
  </div>
  <div style="display:flex;gap:0.4rem;align-items:center;">
    <button class="btn btn-ghost btn-sm" title="מחק משמרות" onclick="openDeleteModal()">🗑️</button>
    <button class="btn btn-ghost btn-sm" id="themeBtn" onclick="toggleThemeUI()" title="ערכת נושא">🌙</button>
  </div>
</header>

<!-- באנרים -->
<div id="offline-banner" class="offline-banner" style="display:none;">⚠️ אין חיבור לאינטרנט</div>
<div id="update-banner"  style="display:none;"></div>

<div class="page-wrap">

  <!-- שעון -->
  <div class="clock-wrap">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate">—</div>
  </div>

  <!-- progress אכלוס -->
  <div class="fill-bar-wrap">
    <div class="fill-bar-label">
      <span>אכלוס עמדות</span>
      <span id="fillPct">—</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="fillBar" style="width:0%;"></div>
    </div>
  </div>

  <!-- סטטיסטיקות -->
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">סה"כ</div></div>
    <div class="stat-card"><div class="stat-value" id="statAssigned" style="color:var(--green)">—</div><div class="stat-label">משובצות</div></div>
    <div class="stat-card"><div class="stat-value" id="statForced" style="color:var(--red)">—</div><div class="stat-label">כפויות</div></div>
    <div class="stat-card"><div class="stat-value" id="statNow" style="color:var(--accent)">—</div><div class="stat-label">עכשיו</div></div>
  </div>

  <!-- חיפוש + פילטרים -->
  <div class="search-bar" style="margin-bottom:0.5rem;">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="חפש חייל..." oninput="applyFilter()">
  </div>
  <div class="filter-chips" style="margin-bottom:0.75rem;">
    <button class="chip active" onclick="setFilter('all',this)">הכל</button>
    <button class="chip" onclick="setFilter('now',this)">עכשיו</button>
    <button class="chip" onclick="setFilter('empty',this)">ריקים</button>
    <button class="chip" onclick="setFilter('forced',this)">כפויים</button>
  </div>

  <!-- כרטיס חייל מודגש -->
  <div id="highlightCard" style="display:none;"></div>

  <!-- לוח משמרות -->
  <div id="boardWrap">
    <div class="empty-state"><div class="spinner" style="margin:auto;"></div></div>
  </div>

</div>

<!-- ══ מודל מחיקת משמרות ══ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🗑️ מחיקת משמרות</div>

    <div style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.85rem;">
      <!-- מחק הכל -->
      <button class="btn btn-danger btn-full" onclick="deleteAll()">☢️ מחק את כל המשמרות</button>

      <!-- מחק לפי טווח -->
      <div class="card" style="padding:0.75rem;margin:0;">
        <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.5rem;">🗓 מחק לפי טווח זמן</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem;">
          <div>
            <label class="form-label">התחלה</label>
            <input type="datetime-local" id="delStart" class="form-input">
          </div>
          <div>
            <label class="form-label">סיום</label>
            <input type="datetime-local" id="delEnd" class="form-input">
          </div>
        </div>
        <button class="btn btn-danger btn-sm btn-full" onclick="deleteByRange()">מחק טווח</button>
      </div>

      <!-- בחירה ידנית -->
      <div class="card" style="padding:0.75rem;margin:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
          <div style="font-weight:700;font-size:0.85rem;">☑️ בחר משמרות ידנית</div>
          <div style="display:flex;gap:0.4rem;">
            <button class="btn btn-ghost btn-sm" onclick="selectAllShifts(true)">בחר הכל</button>
            <button class="btn btn-ghost btn-sm" onclick="selectAllShifts(false)">נקה</button>
          </div>
        </div>
        <div id="shiftCheckList" style="max-height:220px;overflow-y:auto;"></div>
        <button class="btn btn-danger btn-sm btn-full" style="margin-top:0.5rem;" onclick="deleteSelected()">
          מחק נבחרים
        </button>
      </div>
    </div>

    <button class="btn btn-ghost btn-full" onclick="closeDeleteModal()">סגור</button>
  </div>
</div>

<!-- ══ מודל חירום ══ -->
<div class="modal-overlay" id="emergencyModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🚨 שיבוץ חירום</div>
    <div id="emergencyContent"></div>
    <button class="btn btn-ghost btn-full" style="margin-top:0.75rem;" onclick="closeEmergency()">סגור</button>
  </div>
</div>

<script type="module">
import {
  subscribeToBoard, getSettings, getGroups,
  updateShift, toggleShiftLock, deleteShiftsInRange, deleteAllShifts
} from './js/firebase.js';
import { findEmergencySoldier } from './js/logic.js';
import {
  initPage, showToast, confirmDialog, toggleTheme,
  formatTime, formatDate, formatDayName, formatMinutes,
  toLocalInputValue, fromLocalInputValue, restBadge, APP_VERSION
} from './js/ui.js';

initPage();

// ── מצב ──────────────────────────────────────
let allShifts = [], allSoldiers = [], allPosts = [], allGroups = [];
let settings  = {};
let filterMode = 'all';
let searchQ    = '';
let highlighted = null;

// ── שעון ─────────────────────────────────────
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('clockTime').textContent =
      now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('clockDate').textContent =
      now.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  tick();
  setInterval(tick, 1000);
}
startClock();

// ── טעינה ─────────────────────────────────────
settings = await getSettings();
allGroups = await getGroups();

const unsub = subscribeToBoard(({ shifts, soldiers, posts }) => {
  allShifts   = shifts;
  allSoldiers = soldiers;
  allPosts    = posts;
  renderBoard();
});

window.addEventListener('unload', () => unsub?.());

// ── ערכת נושא ────────────────────────────────
window.toggleThemeUI = function() {
  const theme = toggleTheme();
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
};

// ── פילטר ────────────────────────────────────
window.setFilter = (f, btn) => {
  filterMode = f;
  document.querySelectorAll('.filter-chips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderBoard();
};

window.applyFilter = () => {
  searchQ = document.getElementById('searchInput').value.trim().toLowerCase();
  renderBoard();
};

// ── רינדור ───────────────────────────────────
function renderBoard() {
  const now = new Date().toISOString();
  const minRest = settings.min_rest_minutes ?? 240;

  const soldiersMap = {}, postsMap = {}, groupsMap = {};
  allSoldiers.forEach(s => { soldiersMap[s.id] = s; });
  allPosts.forEach(p    => { postsMap[p.id]    = p; });
  allGroups.forEach(g   => { groupsMap[g.id]   = g; });

  // סטטיסטיקות
  const total    = allShifts.length;
  const assigned = allShifts.filter(s => s.soldier_id).length;
  const forced   = allShifts.filter(s => s.is_forced).length;
  const active   = allShifts.filter(s => s.soldier_id && s.start_time <= now && s.end_time > now).length;
  const pct      = total > 0 ? Math.round((assigned / total) * 100) : 0;

  document.getElementById('statTotal').textContent    = total;
  document.getElementById('statAssigned').textContent = assigned;
  document.getElementById('statForced').textContent   = forced;
  document.getElementById('statNow').textContent      = active;
  document.getElementById('fillPct').textContent      = pct + '%';
  document.getElementById('fillBar').style.width      = pct + '%';
  document.getElementById('fillBar').style.background =
    pct >= 90 ? 'var(--green)' : pct >= 60 ? 'var(--accent)' : 'var(--yellow)';
  document.getElementById('headerSub').textContent    = `${assigned}/${total} משמרות מאוישות`;

  // סינון
  let filtered = allShifts;
  if (filterMode === 'now')    filtered = filtered.filter(s => s.start_time <= now && s.end_time > now);
  if (filterMode === 'empty')  filtered = filtered.filter(s => !s.soldier_id);
  if (filterMode === 'forced') filtered = filtered.filter(s => s.is_forced);
  if (searchQ) {
    filtered = filtered.filter(s => {
      const sol = s.soldier_id ? soldiersMap[s.soldier_id] : null;
      return sol
        ? `${sol.first_name} ${sol.last_name}`.toLowerCase().includes(searchQ)
        : false;
    });
  }

  filtered.sort((a, b) => a.start_time.localeCompare(b.start_time));

  if (filtered.length === 0) {
    document.getElementById('boardWrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">אין משמרות${searchQ || filterMode !== 'all' ? ' תואמות' : ''}</div>
        <div class="empty-desc">הפעל שיבוץ בדף השיבוץ</div>
      </div>`;
    return;
  }

  // קיבוץ לפי יום
  const byDay = {};
  filtered.forEach(s => {
    const day = s.start_time.substring(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(s);
  });

  let html = '';
  Object.entries(byDay).forEach(([day, dayShifts]) => {
    html += `<div class="day-divider">
      <span>📅 ${formatDayName(day + 'T12:00:00')} — ${formatDate(day + 'T12:00:00')}</span>
      <span style="font-size:0.7rem;font-weight:400;">${dayShifts.filter(s => s.soldier_id).length}/${dayShifts.length}</span>
    </div>`;

    dayShifts.forEach(s => {
      const soldier   = s.soldier_id ? soldiersMap[s.soldier_id] : null;
      const post      = postsMap[s.post_id];
      const group     = soldier?.group_id ? groupsMap[soldier.group_id] : null;
      const postColor = post?.post_color || '#9ca3af';
      const isActive  = s.start_time <= now && s.end_time > now;
      const isEmpty   = !s.soldier_id;
      const isLocked  = s.is_locked;

      let rowClass = '';
      if (isLocked && soldier) rowClass = 'locked';
      else if (s.is_forced)    rowClass = 'forced';
      else if (isActive && soldier) rowClass = 'active';
      else if (isEmpty)        rowClass = 'empty';
      if (highlighted === s.id) rowClass += ' highlighted';

      const countdown = isActive && soldier
        ? ` <span style="font-size:0.68rem;color:var(--text-muted);">(${formatMinutes(Math.round((new Date(s.end_time) - new Date()) / 60000))})</span>`
        : '';

      html += `
        <div class="shift-row ${rowClass}" onclick="onRowClick('${s.id}','${s.soldier_id || ''}')">
          <div class="shift-post-bar" style="background:${postColor};"></div>

          <div class="shift-time">${formatTime(s.start_time)}–${formatTime(s.end_time)}</div>

          <div class="shift-post">${post?.name || '—'}</div>

          <div class="shift-soldier">
            ${soldier
              ? `${group
                  ? `<span class="group-dot-inline" style="background:${group.color_hex || '#9ca3af'};" title="${group.name}"></span>`
                  : ''}
                 ${soldier.first_name} ${soldier.last_name}
                 ${isLocked ? '🔒' : ''}${s.is_forced ? ' ⚡' : ''}${countdown}`
              : `<span style="color:var(--text-muted);">—</span>`}
          </div>

          ${restBadge(s.rest_before_minutes, settings.min_rest_minutes ?? 240, s.is_forced)}

          <div class="shift-actions" onclick="event.stopPropagation();">
            ${isEmpty
              ? `<button class="btn btn-danger btn-sm" style="font-size:0.7rem;padding:2px 7px;"
                  onclick="openEmergency('${s.post_id}','${s.requirement_id || ''}','${s.id}')">🚨 חירום</button>`
              : `<button class="btn btn-ghost btn-sm" style="font-size:0.78rem;"
                  onclick="toggleLock('${s.id}',${!s.is_locked})">${isLocked ? '🔓' : '🔒'}</button>`}
          </div>
        </div>`;
    });
  });

  document.getElementById('boardWrap').innerHTML = html;

  // כרטיס חייל מודגש
  if (highlighted) {
    const sh = allShifts.find(s => s.id === highlighted);
    const sol = sh?.soldier_id ? soldiersMap[sh.soldier_id] : null;
    if (sol) {
      const group = sol.group_id ? groupsMap[sol.group_id] : null;
      const myShifts = allShifts.filter(s => s.soldier_id === sol.id)
        .sort((a, b) => b.start_time.localeCompare(a.start_time)).slice(0, 3);
      document.getElementById('highlightCard').style.display = 'block';
      document.getElementById('highlightCard').innerHTML = `
        <div class="soldier-highlight-card">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;">
            ${group ? `<span class="group-dot-inline" style="width:12px;height:12px;background:${group.color_hex};"></span>` : ''}
            <strong>${sol.first_name} ${sol.last_name}</strong>
            <span style="font-size:0.72rem;color:var(--text-muted);">#${sol.soldier_number || '?'}</span>
            <button class="btn btn-ghost btn-sm" style="margin-right:auto;font-size:0.7rem;"
              onclick="highlighted=null;renderBoardProxy()">✕</button>
          </div>
          ${group ? `<div style="font-size:0.75rem;color:${group.color_hex};font-weight:600;margin-bottom:0.3rem;">${group.name}</div>` : ''}
          <div style="font-size:0.78rem;color:var(--text-muted);">
            ${myShifts.map(s => `${formatTime(s.start_time)}–${formatTime(s.end_time)} (${formatDate(s.start_time)})`).join(' · ')}
          </div>
        </div>`;
    } else {
      document.getElementById('highlightCard').style.display = 'none';
    }
  } else {
    document.getElementById('highlightCard').style.display = 'none';
  }
}

window.renderBoardProxy = () => renderBoard();

// ── קליק על שורה ────────────────────────────
window.onRowClick = function(shiftId, soldierId) {
  if (soldierId) {
    highlighted = highlighted === shiftId ? null : shiftId;
    renderBoard();
  }
};

// ── נעילה ────────────────────────────────────
window.toggleLock = async function(id, locked) {
  try {
    await toggleShiftLock(id, locked);
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

// ── חירום ────────────────────────────────────
window.openEmergency = async function(postId, reqId, shiftId) {
  document.getElementById('emergencyContent').innerHTML =
    '<div class="spinner" style="margin:1rem auto;"></div>';
  document.getElementById('emergencyModal').classList.add('open');

  try {
    const candidates = await findEmergencySoldier(postId, reqId);
    const groupsMap = {};
    allGroups.forEach(g => { groupsMap[g.id] = g; });

    if (candidates.length === 0) {
      document.getElementById('emergencyContent').innerHTML =
        '<div style="text-align:center;padding:1rem;color:var(--text-muted);">אין חיילים זמינים כרגע</div>';
      return;
    }

    let html = '<div style="display:flex;flex-direction:column;gap:0.4rem;">';
    candidates.forEach(c => {
      const group = c.group_id ? groupsMap[c.group_id] : null;
      html += `
        <div style="display:flex;align-items:center;justify-content:space-between;
          padding:0.5rem 0.6rem;background:var(--bg-row);border:1px solid var(--border);
          border-radius:var(--radius-md);">
          <div>
            <div style="font-weight:600;font-size:0.88rem;display:flex;align-items:center;gap:0.35rem;">
              ${group ? `<span class="group-dot-inline" style="background:${group.color_hex || '#9ca3af'};"></span>` : ''}
              ${c.first_name} ${c.last_name}
              ${!c.isLegal ? '<span class="badge badge-red" style="font-size:0.65rem;">מנוחה קצרה</span>' : ''}
            </div>
            <div style="font-size:0.72rem;color:var(--text-muted);">
              ${group ? group.name + ' · ' : ''}מנוחה: ${c.restMins === 999999 ? 'לא שמר' : formatMinutes(c.restMins)}
            </div>
          </div>
          <button class="btn btn-primary btn-sm"
            onclick="assignEmergency('${shiftId}','${c.id}')">שבץ</button>
        </div>`;
    });
    html += '</div>';
    document.getElementById('emergencyContent').innerHTML = html;
  } catch (err) {
    document.getElementById('emergencyContent').innerHTML =
      `<div style="color:var(--red);">שגיאה: ${err.message}</div>`;
  }
};

window.assignEmergency = async function(shiftId, soldierId) {
  try {
    await updateShift(shiftId, {
      soldier_id: soldierId, is_forced: false,
      rest_before_minutes: null, updated_at: new Date().toISOString()
    });
    showToast('✓ חייל שובץ', 'success');
    closeEmergency();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

window.closeEmergency = () =>
  document.getElementById('emergencyModal').classList.remove('open');

// ── מחיקת משמרות ─────────────────────────────
window.openDeleteModal = function() {
  // מלא רשימת checkboxes
  const sorted = [...allShifts].sort((a, b) => a.start_time.localeCompare(b.start_time));
  const soldiersMap = {}, postsMap = {};
  allSoldiers.forEach(s => { soldiersMap[s.id] = s; });
  allPosts.forEach(p    => { postsMap[p.id]    = p; });

  const list = document.getElementById('shiftCheckList');
  if (sorted.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:0.82rem;padding:0.3rem 0;">אין משמרות</div>';
  } else {
    list.innerHTML = sorted.map(s => {
      const sol  = s.soldier_id ? soldiersMap[s.soldier_id] : null;
      const post = postsMap[s.post_id];
      return `
        <label class="delete-shift-item">
          <input type="checkbox" value="${s.id}">
          <span style="flex:1;">
            <span style="color:var(--text-muted);font-size:0.75rem;">${formatDate(s.start_time)} ${formatTime(s.start_time)}–${formatTime(s.end_time)}</span>
            · ${post?.name || '—'}
            ${sol ? `· <strong>${sol.first_name} ${sol.last_name}</strong>` : '· <span style="color:var(--text-muted);">ריק</span>'}
          </span>
        </label>`;
    }).join('');
  }

  // ברירות מחדל לטווח
  const now = new Date(); now.setMinutes(0, 0, 0);
  const end = new Date(now.getTime() + 48 * 3600000);
  document.getElementById('delStart').value = toLocalInputValue(now.toISOString());
  document.getElementById('delEnd').value   = toLocalInputValue(end.toISOString());

  document.getElementById('deleteModal').classList.add('open');
};

window.closeDeleteModal = () =>
  document.getElementById('deleteModal').classList.remove('open');

window.selectAllShifts = function(val) {
  document.querySelectorAll('#shiftCheckList input[type=checkbox]')
    .forEach(c => { c.checked = val; });
};

window.deleteAll = async function() {
  if (!await confirmDialog('למחוק את כל המשמרות? פעולה זו בלתי הפיכה.', 'מחק הכל')) return;
  try {
    await deleteAllShifts();
    showToast('✓ כל המשמרות נמחקו', 'success');
    closeDeleteModal();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

window.deleteByRange = async function() {
  const sv = document.getElementById('delStart').value;
  const ev = document.getElementById('delEnd').value;
  if (!sv || !ev) { showToast('נא לבחור טווח', 'warning'); return; }
  if (!await confirmDialog('למחוק את כל המשמרות בטווח שנבחר?', 'מחק')) return;
  try {
    const n = await deleteShiftsInRange(fromLocalInputValue(sv), fromLocalInputValue(ev));
    showToast(`✓ נמחקו ${n} משמרות`, 'success');
    closeDeleteModal();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

window.deleteSelected = async function() {
  const checked = [...document.querySelectorAll('#shiftCheckList input:checked')].map(c => c.value);
  if (checked.length === 0) { showToast('לא נבחרו משמרות', 'warning'); return; }
  if (!await confirmDialog(`למחוק ${checked.length} משמרות נבחרות?`, 'מחק')) return;
  try {
    await Promise.all(checked.map(id =>
      import('./js/firebase.js').then(m => m.deleteShift(id))
    ));
    showToast(`✓ נמחקו ${checked.length} משמרות`, 'success');
    closeDeleteModal();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

// סגירת מודלים בקליק חיצוני
['deleteModal', 'emergencyModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// בדיקת אינטרנט
window.addEventListener('online',  () => { document.getElementById('offline-banner').style.display = 'none'; });
window.addEventListener('offline', () => { document.getElementById('offline-banner').style.display = 'block'; });
if (!navigator.onLine) document.getElementById('offline-banner').style.display = 'block';
</script>
</body>
</html>
