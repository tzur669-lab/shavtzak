<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - עמדות</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .post-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 0.85rem 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .post-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .post-card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .post-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      margin-bottom: 0.6rem;
    }

    .post-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .post-meta { font-size: 0.72rem; color: var(--text-muted); }
    .post-reqs { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 0.4rem; }

    .req-chip {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 10px;
      background: var(--bg-row-alt);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .req-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.6rem;
      background: var(--bg-row);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 0.4rem;
      gap: 0.5rem;
    }
    .req-item-left { display: flex; align-items: center; gap: 0.4rem; flex: 1; }
  </style>
</head>
<body class="page-enter">

<header class="page-header">
  <div>
    <div class="page-title">🏰 עמדות</div>
    <div class="page-subtitle" id="countLabel">טוען...</div>
  </div>
  <button class="btn btn-primary btn-sm" onclick="openModal()">+ הוסף עמדה</button>
</header>

<div style="padding:0.75rem 0.85rem 0.5rem;">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="חפש עמדה..." oninput="filterPosts()">
  </div>
</div>

<div class="page-wrap" id="postsContainer" style="padding-top:0.25rem;">
  <div class="empty-state"><div class="spinner" style="margin:auto;"></div></div>
</div>

<!-- מודל עמדה -->
<div class="modal-overlay" id="postModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">➕ הוסף עמדה</div>

    <div class="form-group">
      <label class="form-label">שם העמדה</label>
      <input type="text" id="fldName" class="form-input" placeholder="שער כניסה">
    </div>

    <div class="form-group">
      <label class="form-label">משך משמרת (דקות)</label>
      <input type="number" id="fldDur" class="form-input" value="60" min="30" step="30">
    </div>

    <div class="form-group">
      <label class="form-label">צבע עמדה</label>
      <div id="colorPickerWrap"></div>
    </div>

    <hr class="divider">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
      <div style="font-weight:700;font-size:0.85rem;">📋 דרישות עמדה</div>
      <button class="btn btn-secondary btn-sm" onclick="addReq()">+ הוסף</button>
    </div>
    <div id="reqsList"></div>
    <div class="info-box" style="margin-top:0.4rem;">כל דרישה = תקן אחד. עמדה יכולה לדרוש מספר חיילים בו-זמנית.</div>

    <div style="display:flex;gap:0.5rem;margin-top:0.85rem;">
      <button class="btn btn-primary" style="flex:1;" onclick="savePost()">💾 שמור</button>
      <button class="btn btn-secondary" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<script type="module">
import {
  getPosts, getRoles, addPost, updatePost, deletePost,
  addRequirement, updateRequirement, deleteRequirement
} from './js/firebase.js';
import { initPage, showToast, confirmDialog, createColorPicker, formatMinutes, COLOR_PALETTE } from './js/ui.js';

initPage();

let posts = [], roles = [];
let editingId = null;
let chosenColor = COLOR_PALETTE[0];
let searchQ = '';

// מחזיק דרישות זמניות במודל
let tempReqs = [];

async function loadAll() {
  [posts, roles] = await Promise.all([getPosts(), getRoles()]);
  renderPosts();
}

function renderPosts() {
  const roleMap = {};
  roles.forEach(r => { roleMap[r.id] = r; });

  let filtered = posts;
  if (searchQ) filtered = posts.filter(p => p.name?.toLowerCase().includes(searchQ));

  document.getElementById('countLabel').textContent = `${filtered.length} עמדות`;

  if (filtered.length === 0) {
    document.getElementById('postsContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏰</div>
        <div class="empty-title">אין עמדות${searchQ ? ' תואמות' : ''}</div>
        <div class="empty-desc">הוסף עמדה כדי להתחיל</div>
      </div>`;
    return;
  }

  let html = '<div class="posts-grid">';
  filtered.forEach(p => {
    const color = p.post_color || '#9ca3af';
    const reqs  = p.requirements
      ? Object.entries(p.requirements).map(([id,d]) => ({ id, ...d }))
      : [];
    const durLabel = formatMinutes(p.duration_minutes || 60);

    html += `
      <div class="post-card" onclick="openModal('${p.id}')">
        <div class="post-card-accent" style="background:${color};"></div>
        <div class="post-icon" style="background:${color}22;border:1.5px solid ${color}44;">
          🏰
        </div>
        <div class="post-name">${p.name || '—'}</div>
        <div class="post-meta">⏱ ${durLabel} · ${reqs.length} תקנים</div>
        <div class="post-reqs">
          ${reqs.map(r => {
            const role = r.required_role_id ? roleMap[r.required_role_id] : null;
            return `<span class="req-chip">${r.label || (role ? role.name : 'כללי')}</span>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:0.3rem;margin-top:0.6rem;">
          <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="event.stopPropagation();deletePostUI('${p.id}')">🗑️</button>
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('postsContainer').innerHTML = html;
}

window.filterPosts = () => {
  searchQ = document.getElementById('searchInput').value.trim().toLowerCase();
  renderPosts();
};

// ── מודל ─────────────────────────────────────
window.openModal = function(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? '✏️ ערוך עמדה' : '➕ הוסף עמדה';

  if (id) {
    const p = posts.find(x => x.id === id);
    if (p) {
      document.getElementById('fldName').value = p.name || '';
      document.getElementById('fldDur').value  = p.duration_minutes || 60;
      chosenColor = p.post_color || COLOR_PALETTE[0];
      tempReqs = p.requirements
        ? Object.entries(p.requirements).map(([rid, d]) => ({ id: rid, ...d }))
        : [];
    }
  } else {
    document.getElementById('fldName').value = '';
    document.getElementById('fldDur').value  = 60;
    chosenColor = COLOR_PALETTE[Math.floor(Math.random() * 5)];
    tempReqs = [];
  }

  // color picker
  const wrap = document.getElementById('colorPickerWrap');
  wrap.innerHTML = '';
  wrap.appendChild(createColorPicker(chosenColor, c => { chosenColor = c; }));

  renderReqs();
  document.getElementById('postModal').classList.add('open');
};

window.closeModal = () => document.getElementById('postModal').classList.remove('open');

function renderReqs() {
  const roleMap = {};
  roles.forEach(r => { roleMap[r.id] = r; });

  const list = document.getElementById('reqsList');
  if (tempReqs.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:0.3rem 0;">אין דרישות — הוסף תקן</div>';
    return;
  }

  list.innerHTML = tempReqs.map((r, i) => `
    <div class="req-item">
      <div class="req-item-left">
        <input type="text" class="form-input" style="flex:1;height:32px;font-size:0.82rem;"
          value="${r.label || ''}" placeholder="תיאור (רס"ן, חובש...)"
          onchange="updateTempReq(${i},'label',this.value)">
        <select class="form-select" style="width:auto;height:32px;font-size:0.78rem;"
          onchange="updateTempReq(${i},'required_role_id',this.value)">
          <option value="">כל תפקיד</option>
          ${roles.map(role => `<option value="${role.id}" ${r.required_role_id===role.id?'selected':''}>${role.name}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeTempReq(${i})">✕</button>
    </div>`).join('');
}

window.addReq = () => {
  tempReqs.push({ id: null, label: '', required_role_id: null });
  renderReqs();
};

window.updateTempReq = (i, field, val) => {
  tempReqs[i][field] = val || null;
};

window.removeTempReq = (i) => {
  tempReqs.splice(i, 1);
  renderReqs();
};

window.savePost = async function() {
  const name = document.getElementById('fldName').value.trim();
  if (!name) { showToast('נא להזין שם עמדה', 'warning'); return; }

  const data = {
    name,
    duration_minutes: parseInt(document.getElementById('fldDur').value) || 60,
    post_color: chosenColor
  };

  try {
    if (editingId) {
      await updatePost(editingId, data);
      // עדכן דרישות: מחק קיימות, הוסף מחדש
      const existing = posts.find(p => p.id === editingId);
      if (existing?.requirements) {
        for (const rid of Object.keys(existing.requirements)) {
          await deleteRequirement(editingId, rid);
        }
      }
      for (const req of tempReqs) {
        if (req.label || req.required_role_id) {
          await addRequirement(editingId, { label: req.label || '', required_role_id: req.required_role_id || null });
        }
      }
      showToast('✓ עמדה עודכנה', 'success');
    } else {
      const newRef = await addPost(data);
      for (const req of tempReqs) {
        if (req.label || req.required_role_id) {
          await addRequirement(newRef.key, { label: req.label || '', required_role_id: req.required_role_id || null });
        }
      }
      showToast('✓ עמדה נוספה', 'success');
    }
    closeModal();
    await loadAll();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

window.deletePostUI = async function(id) {
  const p = posts.find(x => x.id === id);
  if (!await confirmDialog(`למחוק את העמדה "${p?.name}"?`, 'מחק')) return;
  try {
    await deletePost(id);
    showToast('✓ עמדה נמחקה', 'success');
    await loadAll();
  } catch (err) {
    showToast('שגיאה: ' + err.message, 'error');
  }
};

document.getElementById('postModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadAll();
</script>
</body>
</html>
