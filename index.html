<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שבצ"ק - לוח שמירות</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.rtl.min.css">
  <style>
    :root {
      --bg-base:    #0d1117;
      --bg-card:    #161b22;
      --bg-row:     #1e2530;
      --border:     #30363d;
      --text-main:  #e6edf3;
      --text-muted: #7d8590;
      --accent:     #1f6feb;
      --forced:     rgba(220,53,69,0.18);
      --empty:      rgba(108,117,125,0.12);
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg-base);
      color: var(--text-main);
      font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
      font-size: 0.88rem;
      min-height: 100vh;
    }

    /* ─── Navigation ─── */
    .nav-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-bar .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-left: auto;
      white-space: nowrap;
    }
    .nav-link {
      color: var(--text-muted) !important;
      padding: 0.35rem 0.65rem !important;
      border-radius: 6px;
      font-size: 0.82rem;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { background: rgba(255,255,255,0.07); color: var(--text-main) !important; }
    .nav-link.active { background: rgba(31,111,235,0.2); color: #58a6ff !important; }

    /* ─── Status bar ─── */
    .status-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 1rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .status-bar span { display: flex; align-items: center; gap: 0.3rem; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #238636; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ─── Board table ─── */
    .board-wrap { padding: 0.75rem; }

    .board-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .board-table thead th {
      background: var(--bg-card);
      padding: 0.55rem 0.75rem;
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .board-table tbody tr {
      background: var(--bg-row);
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .board-table tbody tr:last-child { border-bottom: none; }
    .board-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    .board-table td { padding: 0.55rem 0.75rem; vertical-align: middle; }

    /* שורת עמדה - פס צבע */
    .post-name-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .post-bar {
      width: 4px;
      height: 32px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* תא חייל */
    .soldier-cell {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
    }
    .soldier-name { font-weight: 500; }
    .soldier-name.highlighted { color: #ffc107; }

    /* סטטוסים */
    .row-forced { background: var(--forced) !important; }
    .row-empty  { background: var(--empty) !important; color: var(--text-muted); }
    .row-active { background: rgba(35,134,54,0.12) !important; }

    /* badge */
    .badge-role {
      background: rgba(255,193,7,0.12);
      color: #e3b341;
      border: 1px solid rgba(255,193,7,0.25);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.68rem;
    }
    .badge-forced {
      background: rgba(220,53,69,0.8);
      color: #fff;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.68rem;
    }
    .group-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }

    /* זמן נוכחי */
    .current-time-row td {
      background: rgba(31,111,235,0.15) !important;
      border-top: 2px solid var(--accent) !important;
      border-bottom: 2px solid var(--accent) !important;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* סקשן header */
    .section-header {
      padding: 0.35rem 0.75rem;
      background: rgba(31,111,235,0.08);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }

    /* טעינה */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg-base);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; flex-direction: column; gap: 1rem;
    }
    .loading-overlay .logo { font-size: 2rem; font-weight: 700; color: var(--accent); }

    /* כפתור רענן */
    .btn-refresh {
      background: rgba(31,111,235,0.15);
      color: #58a6ff;
      border: 1px solid rgba(31,111,235,0.3);
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: rgba(31,111,235,0.25); }

    /* responsive */
    @media (max-width: 600px) {
      .nav-bar { padding: 0.4rem 0.5rem; }
      .board-wrap { padding: 0.4rem; }
      .board-table thead th, .board-table td { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
      .status-bar { gap: 0.75rem; font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<!-- טעינה -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="logo">⚔ שבצ"ק</div>
  <div class="spinner-border text-primary" role="status"></div>
  <div style="color:#7d8590;font-size:0.85rem;">טוען נתונים...</div>
</div>

<!-- ניווט -->
<nav class="nav-bar">
  <span class="brand">⚔ שבצ"ק</span>
  <a href="index.html"    class="nav-link active">לוח</a>
  <a href="shifts.html"   class="nav-link">שיבוץ</a>
  <a href="soldiers.html" class="nav-link">חיילים</a>
  <a href="posts.html"    class="nav-link">עמדות</a>
  <a href="admin_check.html" class="nav-link">בקרה</a>
  <a href="settings.html" class="nav-link">הגדרות</a>
  <button class="btn-refresh" onclick="refreshBoard()">⟳ רענן</button>
</nav>

<!-- סטטוס -->
<div class="status-bar">
  <span><span class="status-dot"></span> חי</span>
  <span>🕐 <span id="currentTime">—</span></span>
  <span>עדכון אחרון: <span id="lastUpdate">—</span></span>
  <span>משמרות: <span id="shiftCount">—</span></span>
</div>

<!-- לוח -->
<div class="board-wrap">
  <div id="boardContainer">
    <div class="empty-state">
      <div class="icon">📋</div>
      <div>טוען לוח שמירות...</div>
    </div>
  </div>
</div>

<script type="module">
import { subscribeToBoard, getSettings } from './js/firebase.js';
import { formatTime, formatDateTime, formatMinutes } from './js/ui.js';

let unsubscribe = null;
let allData = null;
let highlightedSoldier = null;
let minRestMinutes = 240;

// ─── שעון ─────────────────────────────────────
function updateClock() {
  const now = new Intl.DateTimeFormat('he-IL', {
    timeZone: 'Asia/Jerusalem',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  }).format(new Date());
  document.getElementById('currentTime').textContent = now;
}
setInterval(updateClock, 1000);
updateClock();

// ─── רענון ────────────────────────────────────
window.refreshBoard = function() {
  if (unsubscribe) unsubscribe();
  startListening();
};

// ─── האזנה לנתונים ────────────────────────────
async function startListening() {
  minRestMinutes = (await getSettings()).min_rest_minutes ?? 240;
  unsubscribe = subscribeToBoard(data => {
    allData = data;
    document.getElementById('lastUpdate').textContent = formatDateTime(new Date().toISOString());
    document.getElementById('loadingOverlay').style.display = 'none';
    renderBoard(data);
  });
}

// ─── רנדור הלוח ───────────────────────────────
function renderBoard({ shifts, soldiers, posts }) {
  const soldiersMap = {};
  soldiers.forEach(s => { soldiersMap[s.id] = s; });
  const postsMap = {};
  posts.forEach(p => { postsMap[p.id] = p; });

  // קבץ לפי עמדה ומיון לפי זמן
  const byPost = {};
  shifts.forEach(s => {
    if (!byPost[s.post_id]) byPost[s.post_id] = [];
    byPost[s.post_id].push(s);
  });
  Object.values(byPost).forEach(arr => arr.sort((a,b) => a.start_time.localeCompare(b.start_time)));

  const nowISO = new Date().toISOString();
  let totalShifts = shifts.length;
  document.getElementById('shiftCount').textContent = totalShifts;

  if (totalShifts === 0) {
    document.getElementById('boardContainer').innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <div style="font-size:1rem;margin-bottom:0.5rem;">אין משמרות מוגדרות</div>
        <div style="font-size:0.82rem;">עבור לדף <a href="shifts.html" style="color:#58a6ff">שיבוץ</a> כדי ליצור משמרות</div>
      </div>`;
    return;
  }

  let html = `<table class="board-table">
    <thead><tr>
      <th>עמדה</th>
      <th>תקן</th>
      <th>חייל</th>
      <th>התחלה</th>
      <th>סיום</th>
      <th>מנוחה</th>
    </tr></thead>
    <tbody>`;

  // מיין עמדות לפי שם
  const sortedPosts = posts.filter(p => byPost[p.id]).sort((a,b) => a.name.localeCompare(b.name, 'he'));

  sortedPosts.forEach(post => {
    const postShifts = byPost[post.id] || [];
    const color = post.post_color || '#6c757d';

    html += `<tr class="section-header">
      <td colspan="6">
        <span style="border-right:3px solid ${color};padding-right:8px;">${post.name}</span>
      </td>
    </tr>`;

    postShifts.forEach(shift => {
      const soldier = shift.soldier_id ? soldiersMap[shift.soldier_id] : null;
      const isActive = shift.start_time <= nowISO && shift.end_time > nowISO;
      const isForced = shift.is_forced;
      const isEmpty  = !shift.soldier_id;

      const req = post.requirements?.[shift.requirement_id];
      const reqLabel = req?.label || '—';

      let rowClass = '';
      if (isActive && !isEmpty) rowClass = 'row-active';
      else if (isForced) rowClass = 'row-forced';
      else if (isEmpty) rowClass = 'row-empty';
      if (highlightedSoldier && shift.soldier_id === highlightedSoldier) rowClass += ' current-time-row';

      // תא חייל
      let soldierCell = '<span style="color:#7d8590;">—</span>';
      if (soldier) {
        const dot = `<span class="group-dot" style="background:${soldier.group_color || '#6c757d'};"></span>`;
        const roles = (soldier.roles || []).map(r => {
          const role = r; // מוצג כ-ID, יש לשפר עם map תפקידים
          return `<span class="badge-role">${r}</span>`;
        }).join(' ');
        const nameClass = highlightedSoldier === soldier.id ? 'highlighted' : '';
        const forcedBadge = isForced ? ' <span class="badge-forced">כפוי</span>' : '';
        soldierCell = `<span class="soldier-cell" onclick="toggleHighlight('${soldier.id}')">
          ${dot}
          <span class="soldier-name ${nameClass}">${soldier.first_name} ${soldier.last_name}</span>
          ${forcedBadge}
        </span>`;
      }

      // מנוחה
      const restDisplay = shift.rest_before_minutes !== null && shift.rest_before_minutes !== undefined
        ? formatMinutes(shift.rest_before_minutes)
        : '—';
      const restColor = shift.rest_before_minutes < minRestMinutes && shift.rest_before_minutes !== null
        ? '#fd7e14' : '#7d8590';

      html += `<tr class="${rowClass}">
        <td>
          <div class="post-name-cell">
            <span class="post-bar" style="background:${color};"></span>
            <span>${isActive ? '▶ ' : ''}${reqLabel}</span>
          </div>
        </td>
        <td style="color:#7d8590;">${reqLabel}</td>
        <td>${soldierCell}</td>
        <td style="font-variant-numeric:tabular-nums;">${formatTime(shift.start_time)}</td>
        <td style="font-variant-numeric:tabular-nums;">${formatTime(shift.end_time)}</td>
        <td style="color:${restColor};font-variant-numeric:tabular-nums;">${restDisplay}</td>
      </tr>`;
    });
  });

  html += '</tbody></table>';
  document.getElementById('boardContainer').innerHTML = html;
}

// ─── הדגשת חייל ───────────────────────────────
window.toggleHighlight = function(soldierId) {
  highlightedSoldier = highlightedSoldier === soldierId ? null : soldierId;
  if (allData) renderBoard(allData);
};

// ─── התחלה ────────────────────────────────────
startListening();
</script>
</body>
</html>
